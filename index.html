function Invoices() {
  const { entity } = useApp();
  const [invoices, setInvoices] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [filterType, setFilterType] = useState('actual');
  const [showNew, setShowNew] = useState(false);

  useEffect(() => { load(); }, [entity, filterType]);

  async function load() {
    setLoading(true);
    const [r1, r2] = await Promise.all([
      db(entity).from('commercial_invoices').select('*, customers(name,code)').eq('entity', entity).eq('invoice_type', filterType).order('invoice_date', { ascending: false }).limit(200),
      db(entity).from('customers').select('id,name,code').order('name'),
    ]);
    setInvoices(r1.data || []);
    setCustomers(r2.data || []);
    setLoading(false);
  }

  const STATUS_CLS = { draft: 'bgr', issued: 'bb', partial_paid: 'by', paid: 'bg', overdue: 'br', cancelled: 'bgr' };
  const outstanding = invoices.filter(i => i.status !== 'paid' && i.status !== 'cancelled').reduce((s, i) => s + (i.total_amount || 0), 0);
  const paid = invoices.filter(i => i.status === 'paid').reduce((s, i) => s + (i.total_amount || 0), 0);

  return (
    <div>
      <div className="stat-grid">
        <div className="stat-card"><div className="stat-label">Outstanding</div><div className="stat-val" style={{ fontSize: 18, color: 'var(--gold)' }}>{fmtUSD(outstanding)}</div></div>
        <div className="stat-card"><div className="stat-label">Paid</div><div className="stat-val" style={{ fontSize: 18, color: 'var(--green)' }}>{fmtUSD(paid)}</div></div>
        <div className="stat-card"><div className="stat-label">Total Invoices</div><div className="stat-val" style={{ fontSize: 18 }}>{invoices.length}</div></div>
      </div>
      <div style={{ display: 'flex', gap: 10, marginBottom: 14, alignItems: 'center' }}>
        <div className="tabs" style={{ marginBottom: 0, flex: 1 }}>
          <button className={`tab ${filterType === 'actual' ? 'active' : ''}`} onClick={() => setFilterType('actual')}>Actual Amount</button>
          <button className={`tab ${filterType === 'customs_clearance' ? 'active' : ''}`} onClick={() => setFilterType('customs_clearance')}>Customs Clearance</button>
        </div>
        <button className="btn btn-primary btn-sm" onClick={() => setShowNew(true)}>+ New Invoice</button>
      </div>
      <div className="table-wrap">
        <table>
          <thead><tr><th>Invoice No.</th><th>Customer</th><th>Date</th><th>Sailing Date</th><th>Due Date</th><th>Amount</th><th>Balance Due</th><th>Status</th><th>CC Diff</th></tr></thead>
          <tbody>
            {loading ? <tr><td colSpan={9}><div className="empty">Loading...</div></td></tr>
              : invoices.map(inv => (
                <tr key={inv.id}>
                  <td className="td-p td-mono">{inv.invoice_number}</td>
                  <td>{inv.customers?.name}</td>
                  <td>{fmtDate(inv.invoice_date)}</td>
                  <td>{fmtDate(inv.sailing_date)}</td>
                  <td style={{ color: inv.status === 'overdue' ? 'var(--red)' : undefined }}>{fmtDate(inv.due_date)}</td>
                  <td className="td-amt">{fmtUSD(inv.total_amount)}</td>
                  <td className="td-amt" style={{ fontWeight: 600 }}>{fmtUSD((inv.total_amount || 0) - (inv.amount_paid || 0))}</td>
                  <td><span className={`badge ${STATUS_CLS[inv.status] || 'bgr'}`}>{inv.status?.replace(/_/g, ' ')}</span></td>
                  <td>{inv.cc_vs_actual_diff > 0 && <span className={`badge ${inv.credit_note_issued ? 'bg' : 'by'}`}>{inv.credit_note_issued ? '✓ CN' : `Pending $${fmt(inv.cc_vs_actual_diff, 0)}`}</span>}</td>
                </tr>
              ))
            }
          </tbody>
        </table>
      </div>
      {showNew && <NewInvoiceModal customers={customers} entity={entity} filterType={filterType} onClose={() => setShowNew(false)} onSaved={load} />}
    </div>
  );
}

function NewInvoiceModal({ customers, entity, filterType, onClose, onSaved }) {
  const [form, setForm] = useState({ invoice_number: '', invoice_type: filterType, customer_id: '', invoice_date: today(), sailing_date: '', payment_terms: '60 days from date of shipment', shipping_terms: 'FOB SHANGHAI', port_of_destination: '', via: 'OCEAN FREIGHT', goods_description: 'FABRIC', container_number: '', bl_number: '', misc_charges: 0, status: 'issued' });
  const [items, setItems] = useState([{ description: '', color: '', quantity: '', unit_price: '', net_weight: '', gross_weight: '' }]);
  const [saving, setSaving] = useState(false);

  function upItem(i, f, v) { setItems(p => p.map((item, idx) => idx === i ? { ...item, [f]: v } : item)); }
  const subtotal = items.reduce((s, i) => s + ((+i.quantity || 0) * (+i.unit_price || 0)), 0);
  const total = subtotal + (+form.misc_charges || 0);

  async function save() {
    if (!form.invoice_number || !form.customer_id) return;
    setSaving(true);
    const d = db(entity);
    let due_date = null;
    if (form.sailing_date) { const dt = new Date(form.sailing_date); dt.setDate(dt.getDate() + 60); due_date = dt.toISOString().split('T')[0]; }
    const { data: inv, error } = await d.from('commercial_invoices').insert({ ...form, entity, subtotal, total_amount: total, due_date, misc_charges: +form.misc_charges || 0 }).select().single();
    if (error) { setSaving(false); return; }
    const lineItems = items.filter(i => i.description).map((item, idx) => ({ invoice_id: inv.id, line_no: idx + 1, ...item, quantity: +item.quantity || 0, unit_price: +item.unit_price || 0, net_weight: +item.net_weight || null, gross_weight: +item.gross_weight || null }));
    if (lineItems.length) await d.from('invoice_items').insert(lineItems);
    onSaved(); onClose(); setSaving(false);
  }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal modal-lg">
        <div className="modal-hdr"><div className="modal-title">New Commercial Invoice</div><button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button></div>
        <div className="grid2">
          <div className="form-group"><label className="form-label">Invoice Number *</label><input className="form-input" value={form.invoice_number} onChange={e => setForm({ ...form, invoice_number: e.target.value })} placeholder="KAAN20260429C1" /></div>
          <div className="form-group"><label className="form-label">Invoice Type</label><select className="form-input" value={form.invoice_type} onChange={e => setForm({ ...form, invoice_type: e.target.value })}><option value="actual">Actual Amount</option><option value="customs_clearance">Customs Clearance</option></select></div>
          <div className="form-group"><label className="form-label">Customer *</label><select className="form-input" value={form.customer_id} onChange={e => setForm({ ...form, customer_id: e.target.value })}><option value="">Select...</option>{customers.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select></div>
          <div className="form-group"><label className="form-label">Invoice Date</label><input type="date" className="form-input" value={form.invoice_date} onChange={e => setForm({ ...form, invoice_date: e.target.value })} /></div>
          <div className="form-group"><label className="form-label">Sailing Date (ETD)</label><input type="date" className="form-input" value={form.sailing_date} onChange={e => setForm({ ...form, sailing_date: e.target.value })} /></div>
          <div className="form-group"><label className="form-label">Container No.</label><input className="form-input" value={form.container_number} onChange={e => setForm({ ...form, container_number: e.target.value })} /></div>
          <div className="form-group"><label className="form-label">B/L Number</label><input className="form-input" value={form.bl_number} onChange={e => setForm({ ...form, bl_number: e.target.value })} /></div>
          <div className="form-group"><label className="form-label">Port of Destination</label><input className="form-input" value={form.port_of_destination} onChange={e => setForm({ ...form, port_of_destination: e.target.value })} /></div>
          <div className="form-group"><label className="form-label">Via</label><select className="form-input" value={form.via} onChange={e => setForm({ ...form, via: e.target.value })}><option>OCEAN FREIGHT</option><option>AIR</option><option>FEDEX</option><option>DHL</option></select></div>
          <div className="form-group"><label className="form-label">Misc. Charges (USD)</label><input type="number" className="form-input" value={form.misc_charges} onChange={e => setForm({ ...form, misc_charges: e.target.value })} step="0.01" /></div>
        </div>
        <div className="sh" style={{ marginTop: 6 }}>
          <div className="sh-title">Invoice Items</div>
          <button className="btn btn-secondary btn-sm" onClick={() => setItems(p => [...p, { description: '', color: '', quantity: '', unit_price: '', net_weight: '', gross_weight: '' }])}>+ Add</button>
        </div>
        <div className="table-wrap" style={{ marginBottom: 14 }}>
          <table>
            <thead><tr><th>Description</th><th>Color</th><th>Qty (mts)</th><th>Unit Price</th><th>Amount</th><th>Net Wt</th><th>Gross Wt</th><th></th></tr></thead>
            <tbody>
              {items.map((item, i) => (
                <tr key={i}>
                  <td><input className="form-input" style={{ fontSize: 12, padding: '4px 7px' }} value={item.description} onChange={e => upItem(i, 'description', e.target.value)} /></td>
                  <td><input className="form-input" style={{ fontSize: 12, padding: '4px 7px', width: 80 }} value={item.color} onChange={e => upItem(i, 'color', e.target.value)} /></td>
                  <td><input type="number" className="form-input" style={{ fontSize: 12, padding: '4px 7px', width: 80 }} value={item.quantity} onChange={e => upItem(i, 'quantity', e.target.value)} /></td>
                  <td><input type="number" className="form-input" style={{ fontSize: 12, padding: '4px 7px', width: 80 }} value={item.unit_price} onChange={e => upItem(i, 'unit_price', e.target.value)} step="0.0001" /></td>
                  <td className="td-amt" style={{ fontSize: 12 }}>{fmt((+item.quantity || 0) * (+item.unit_price || 0))}</td>
                  <td><input type="number" className="form-input" style={{ fontSize: 12, padding: '4px 7px', width: 70 }} value={item.net_weight} onChange={e => upItem(i, 'net_weight', e.target.value)} /></td>
                  <td><input type="number" className="form-input" style={{ fontSize: 12, padding: '4px 7px', width: 70 }} value={item.gross_weight} onChange={e => upItem(i, 'gross_weight', e.target.value)} /></td>
                  <td><button className="btn btn-ghost btn-sm" style={{ color: 'var(--red)' }} onClick={() => setItems(p => p.filter((_, idx) => idx !== i))}>✕</button></td>
                </tr>
              ))}
              <tr><td colSpan={4} style={{ textAlign: 'right', fontWeight: 600, padding: '9px 13px', color: 'var(--text-primary)' }}>TOTAL:</td><td className="td-amt" style={{ fontWeight: 700, color: 'var(--text-primary)' }}>{fmtUSD(total)}</td><td colSpan={3} /></tr>
            </tbody>
          </table>
        </div>
        <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={save} disabled={saving}>{saving ? 'Saving...' : 'Save Invoice →'}</button>
        </div>
      </div>
    </div>
  );
}

// ─── MASTER DATA ─────────────────────────────────────────────
function Customers() {
  const { entity } = useApp();
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => { db(entity).from('customers').select('*').order('name').then(r => { setData(r.data || []); setLoading(false); }); }, [entity]);
  return (
    <div>
      <div className="table-wrap">
        <table>
          <thead><tr><th>Code</th><th>Name</th><th>Country</th><th>Payment Terms</th><th>Early Pay Discount</th><th>Currency</th><th>Opening Balance</th></tr></thead>
          <tbody>
            {loading ? <tr><td colSpan={7}><div className="empty">Loading...</div></td></tr>
              : data.map(c => (
                <tr key={c.id}>
                  <td className="td-mono">{c.code}</td>
                  <td className="td-p">{c.name}</td>
                  <td style={{ fontSize: 12 }}>{c.country}</td>
                  <td style={{ fontSize: 12 }}>{c.payment_terms_days} days</td>
                  <td>{c.early_payment_discount_pct > 0 ? <span className="badge bg">{c.early_payment_discount_pct}% in {c.early_payment_days}d</span> : '—'}</td>
                  <td className="td-mono">{c.currency}</td>
                  <td className="td-amt">{fmtUSD(c.opening_balance)}</td>
                </tr>
              ))
            }
          </tbody>
        </table>
      </div>
    </div>
  );
}

function Factories() {
  const { entity } = useApp();
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => { db(entity).from('factories').select('*').eq('entity', entity).order('name').then(r => { setData(r.data || []); setLoading(false); }); }, [entity]);
  return (
    <div>
      <div className="table-wrap">
        <table>
          <thead><tr><th>Code</th><th>Name</th><th>Short Name</th><th>Country</th><th>Contact Email</th><th>Opening Balance</th></tr></thead>
          <tbody>
            {loading ? <tr><td colSpan={6}><div className="empty">Loading...</div></td></tr>
              : data.map(f => (
                <tr key={f.id}>
                  <td className="td-mono">{f.code}</td>
                  <td className="td-p">{f.name}</td>
                  <td style={{ fontSize: 12 }}>{f.short_name}</td>
                  <td style={{ fontSize: 12 }}>{f.country}</td>
                  <td style={{ fontSize: 12 }}>{f.contact_email || '—'}</td>
                  <td className="td-amt">{fmtUSD(f.opening_balance)}</td>
                </tr>
              ))
            }
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── ROUTER ──────────────────────────────────────────────────
const PAGE_TITLES = { dashboard: 'Dashboard', alerts: 'Delivery Alerts', 'customer-orders': 'Customer Orders', 'factory-orders': 'Factory POs', proforma: 'Proforma Invoices', invoices: 'Commercial Invoices', shipments: 'Shipments', osr: 'Order Status Reports', payments: 'Payments', deposits: 'Deposits', notes: 'Credit / Debit Notes', commission: 'Arte Linea Commission', pl: 'P&L Statement', ledger: 'Debtors & Creditors', archive: 'Document Archive', customers: 'Customers', factories: 'Factories', products: 'Products & Prices', settings: 'Settings' };

function Router({ page, setPage }) {
  const title = PAGE_TITLES[page] || page;
  const content = (() => {
    switch (page) {
      case 'dashboard': return <Dashboard setPage={setPage} />;
      case 'alerts': return <Alerts />;
      case 'customer-orders': return <CustomerOrders />;
      case 'invoices': return <Invoices />;
      case 'osr': return <OSR />;
      case 'payments': return <Payments />;
      case 'pl': return <PLReport />;
      case 'ledger': return <Ledger />;
      case 'customers': return <Customers />;
      case 'factories': return <Factories />;
      default: return <ComingSoon title={title} />;
    }
  })();
  return <Layout title={title} page={page} setPage={setPage}>{content}</Layout>;
}

// ─── ROOT ────────────────────────────────────────────────────
function App() {
  const [entity, setEntityState] = useState(() => localStorage.getItem('kaan_entity') || 'HK');
  const [user, setUser] = useState(() => { try { return JSON.parse(localStorage.getItem('kaan_user') || 'null'); } catch { return null; } });
  const [page, setPage] = useState('dashboard');

  function setEntity(e) { setEntityState(e); localStorage.setItem('kaan_entity', e); }
  function login(u) { setUser(u); localStorage.setItem('kaan_user', JSON.stringify(u)); }
  function logout() { setUser(null); localStorage.removeItem('kaan_user'); }

  if (!user) return (
    <Ctx.Provider value={{ entity, setEntity, user, login, logout }}>
      <Login />
    </Ctx.Provider>
  );

  return (
    <Ctx.Provider value={{ entity, setEntity, user, login, logout }}>
      <Router page={page} setPage={setPage} />
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
