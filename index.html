// ─── ARTE LINEA COMMISSION ───────────────────────────────────
function Commission() {
  const { entity } = useApp();
  const [tab, setTab] = useState('new');
  const [shipmentRef, setShipmentRef] = useState('');
  const [shipmentDate, setShipmentDate] = useState(today());
  const [invoiceNumber, setInvoiceNumber] = useState('');
  const [via, setVia] = useState('SEA');
  const [items, setItems] = useState([]);
  const [savedCommissions, setSavedCommissions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [generatedDoc, setGeneratedDoc] = useState(null);

  useEffect(() => { loadSaved(); }, [entity]);

  async function loadSaved() {
    setLoading(true);
    const { data } = await db(entity).from('commission_invoices')
      .select('*').eq('entity', entity).order('invoice_date', { ascending: false }).limit(50);
    setSavedCommissions(data || []);
    setLoading(false);
  }

  function addItem() {
    setItems(p => [...p, {
      order_no: '', supplier: '', item_name: '', sea_air: via,
      unit_price: '', qty: '', total_amount: 0, commission_pct: 5, commission_amount: 0
    }]);
  }

  function upItem(i, field, val) {
    setItems(p => p.map((item, idx) => {
      if (idx !== i) return item;
      const updated = { ...item, [field]: val };
      // Recalculate totals
      const qty = +updated.qty || 0;
      const price = +updated.unit_price || 0;
      const pct = +updated.commission_pct || 0;
      updated.total_amount = qty * price;
      updated.commission_amount = parseFloat((qty * price * pct / 100).toFixed(4));
      return updated;
    }));
  }

  async function parseCommissionFile(file) {
    // Read uploaded commission Excel file and auto-populate items
    const sheets = await readAllSheets(file);
    const newItems = [];
    for (const [sheetName, rows] of Object.entries(sheets)) {
      const hi = findHeaderRow(rows);
      const headers = rows[hi].map(c => String(c||'').toUpperCase().trim());
      const orderCol = findCol(headers, ['ORDER','PO']);
      const supplierCol = findCol(headers, ['SUPPLIER','FACTORY']);
      const itemCol = findCol(headers, ['ITEM','DESCRIPTION','DESIGN']);
      const dateCol = findCol(headers, ['SHIPMENT DATE','DATE']);
      const seaairCol = findCol(headers, ['SEA','AIR','SEA / AIR']);
      const priceCol = findCol(headers, ['UNIT PRICE','PRICE']);
      const qtyCol = findCol(headers, ['ACTUAL QTY','ACUAL QTY','QTY','QUANTITY']);
      const totalCol = findCol(headers, ['TOTAL AMOUNT','TOTAL']);
      const commPctCol = findCol(headers, ['COMMISSION %','COMM%','COMMISSION%']);
      const commAmtCol = findCol(headers, ['COMMISSION AMOUNT','COMM AMOUNT']);

      if (itemCol < 0 && priceCol < 0) continue;

      for (let i = hi+1; i < rows.length; i++) {
        const row = rows[i];
        const item = itemCol >= 0 ? String(row[itemCol]||'').trim() : '';
        const price = priceCol >= 0 ? parseFloat(row[priceCol]) || 0 : 0;
        const qty = qtyCol >= 0 ? parseFloat(row[qtyCol]) || 0 : 0;
        if (!item && !price && !qty) continue;
        if (SKIP_PATTERNS.test(item)) continue;
        const commPct = commPctCol >= 0 ? parseFloat(row[commPctCol]) || 5 : 5;
        const total = totalCol >= 0 ? parseFloat(row[totalCol]) || (qty * price) : qty * price;
        const commAmt = commAmtCol >= 0 ? parseFloat(row[commAmtCol]) || 0 : parseFloat((total * commPct / 100).toFixed(4));
        newItems.push({
          order_no: orderCol >= 0 ? String(row[orderCol]||'').trim() : '',
          supplier: supplierCol >= 0 ? String(row[supplierCol]||'').trim() : '',
          item_name: item,
          sea_air: seaairCol >= 0 ? String(row[seaairCol]||'').trim() : via,
          unit_price: price,
          qty: qty,
          total_amount: parseFloat(total.toFixed(4)),
          commission_pct: commPct,
          commission_amount: commAmt,
        });
      }
    }
    return newItems;
  }

  const totalCommission = items.reduce((s, i) => s + (i.commission_amount || 0), 0);
  const totalQty = items.reduce((s, i) => s + (+i.qty || 0), 0);
  const totalAmt = items.reduce((s, i) => s + (i.total_amount || 0), 0);

  async function saveAndGenerate() {
    if (!shipmentRef || !invoiceNumber || items.length === 0) {
      alert('Shipment ref, invoice number and at least one item required');
      return;
    }
    setSaving(true);
    const d = db(entity);
    const co = CONFIGS[entity];

    // Save commission invoice
    const { data: ci } = await d.from('commission_invoices').insert({
      invoice_number: invoiceNumber,
      shipment_ref: shipmentRef,
      entity,
      invoice_date: shipmentDate,
      via,
      total_commission: totalCommission,
      status: 'issued',
      paid: false,
    }).select().single();

    if (ci) {
      // Save line items
      const lineItems = items.map((item, idx) => ({
        commission_invoice_id: ci.id,
        line_no: idx + 1,
        order_no: item.order_no,
        supplier: item.supplier,
        item_name: item.item_name,
        sea_air: item.sea_air,
        unit_price: +item.unit_price || 0,
        actual_qty: +item.qty || 0,
        total_amount: item.total_amount,
        commission_pct: +item.commission_pct || 5,
        commission_amount: item.commission_amount,
      }));
      await d.from('commission_invoice_items').insert(lineItems);
    }

    // Generate the two documents:
    // 1. Commission Statement (detailed) - internal reference
    // 2. KAANAL Invoice (simple) - sent to Arte Linea

    const sep = '─'.repeat(100);
    const dateStr = new Date(shipmentDate).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });

    // Commission Statement (detailed breakdown)
    const stmtLines = [
      co.name, co.address, '',
      'COMMISSION STATEMENT', '',
      `Ref: ${shipmentRef}`, `Date: ${dateStr}`, `Via: ${via}`, '',
      'TO: Arte Linea SA DE CV',
      'Prolongacion Recursos Hidraulicos 1-D, Parque Industrial La Loma',
      'Tlalnepantla de Baz, Estado de Mexico, C.P. 54060',
      'Tax ID: ALI071022HA2', '',
      sep,
      'ORDER     SUPPLIER                  ITEM                            SEA/AIR  UNIT PRICE  QTY        TOTAL AMT    COMM%  COMMISSION',
      sep,
      ...items.map(item => {
        const o = String(item.order_no||'').padEnd(10);
        const s = String(item.supplier||'').substring(0,26).padEnd(27);
        const it = String(item.item_name||'').substring(0,32).padEnd(33);
        const sa = String(item.sea_air||'SEA').padEnd(9);
        const up = String(fmtNum(+item.unit_price||0,4)).padEnd(12);
        const q = String(fmtNum(+item.qty||0,1)).padEnd(11);
        const ta = String(fmtNum(item.total_amount||0,3)).padEnd(13);
        const cp = String(item.commission_pct||5)+'%  ';
        const ca = fmtNum(item.commission_amount||0,4);
        return o+s+it+sa+up+q+ta+cp+ca;
      }),
      sep,
      `TOTAL: ${fmtNum(totalQty,1)} mts | Invoice Value: ${fmtUSD(totalAmt)} | Total Commission: ${fmtUSD(totalCommission)}`,
      '', 'BANKING DETAILS:',
      `Company: ${co.name}`, `Account No: ${co.bankAccount}`,
      `Clearing Code: ${co.clearingCode}`, `Bank: ${co.bankName}`, `Swift: ${co.swift}`,
      '', 'For and on behalf of', co.name,
    ].join('\n');

    // KAANAL Invoice (simple - just one line)
    const kaaналLines = [
      co.name, co.address, co.taxId ? `TAX ID: ${co.taxId}` : '', '',
      '   COMMERCIAL INVOICE   ', '',
      'TO:                                    INVOICE NO:  ' + invoiceNumber,
      'Arte Linea SA DE CV                    Invoice Date: ' + dateStr,
      'Prolongacion Recursos Hidraulicos 1-D',
      'Parque Industrial La Loma',
      'Tlalnepantla de Baz, Estado de Mexico',
      'Codigo Postal 54060',
      'Tax ID: ALI071022HA2',
      'Tel: 55616992', '',
      '─'.repeat(60),
      'Description                              Amount (USD)',
      '─'.repeat(60),
      `Commission ${shipmentRef}${' '.repeat(Math.max(1, 41 - ('Commission '+shipmentRef).length))}${fmtUSD(totalCommission)}`,
      '─'.repeat(60),
      `TOTAL AMOUNT${' '.repeat(29)}${fmtUSD(totalCommission)}`,
      '', '', '', '',
      "Beneficiary's Name:  Kaan Group Ltd.        KAAN GROUP LIMITED",
      `${co.address}`,
      '                                         Bank Information',
      `                                         Account Number: ${co.bankAccount}`,
      `                                         Clearing Code: ${co.clearingCode}`,
      `                                         Bank: ${co.bankName}`,
      `                                         Swift: ${co.swift}`,
    ].filter(l => l !== null).join('\n');

    // Save to archive
    if (ci) {
      await d.from('document_archive').insert([
        { doc_number: invoiceNumber, doc_type: 'commission_statement', entity, doc_date: shipmentDate, financial_year: new Date(shipmentDate).getFullYear(), counterparty_type: 'customer', counterparty_name: 'Arte Linea SA DE CV', amount: totalCommission, currency: 'USD', source_table: 'commission_invoices', source_id: ci.id, file_name: `${shipmentRef}_CommissionStatement.txt` },
        { doc_number: invoiceNumber, doc_type: 'commission_invoice', entity, doc_date: shipmentDate, financial_year: new Date(shipmentDate).getFullYear(), counterparty_type: 'customer', counterparty_name: 'Arte Linea SA DE CV', amount: totalCommission, currency: 'USD', source_table: 'commission_invoices', source_id: ci.id, file_name: `${invoiceNumber}.txt` },
      ]);
    }

    setGeneratedDoc({ stmt: stmtLines, invoice: kaaналLines, ref: shipmentRef, invoiceNo: invoiceNumber, total: totalCommission });
    loadSaved();
    setSaving(false);
  }

  function download(content, filename) {
    const blob = new Blob([content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }

  // Commission % info by factory based on historical data
  const COMM_PCT_HINTS = {
    'BEYOND': 4, 'XINRUN': 5, 'FEIFAN': 5, 'DECORATION': 5,
    'TONGHUI': 5, 'TONGHAO': 5, 'LEJI': 5, 'BUWEI': 5,
    'BANGDE': 4, 'HAIHONG': 4, 'RUN&FUN': 5, 'JES': 5,
    'ETEX': 5, 'HUAQIANG': 5, 'KAAN-BANGDE': 4, 'KAAN PTE': 5,
  };

  return (
    <div>
      <div className="tabs">
        <button className={`tab ${tab === 'new' ? 'active' : ''}`} onClick={() => setTab('new')}>➕ New Commission Invoice</button>
        <button className={`tab ${tab === 'history' ? 'active' : ''}`} onClick={() => setTab('history')}>📋 History ({savedCommissions.length})</button>
      </div>

      {tab === 'history' ? (
        <div className="table-wrap">
          <table>
            <thead><tr><th>Invoice No.</th><th>Shipment Ref</th><th>Date</th><th>Via</th><th>Total Commission</th><th>Status</th><th>Paid</th></tr></thead>
            <tbody>
              {loading ? <tr><td colSpan={7}><div className="empty">Loading...</div></td></tr>
                : savedCommissions.length === 0 ? <tr><td colSpan={7}><div className="empty">No commission invoices yet</div></td></tr>
                : savedCommissions.map(ci => (
                  <tr key={ci.id}>
                    <td className="td-p td-mono">{ci.invoice_number}</td>
                    <td className="td-mono" style={{ color: 'var(--accent-light)' }}>{ci.shipment_ref}</td>
                    <td>{fmtDate(ci.invoice_date)}</td>
                    <td><span className="badge bb">{ci.via}</span></td>
                    <td className="td-amt" style={{ color: 'var(--green)', fontWeight: 700 }}>{fmtUSD(ci.total_commission)}</td>
                    <td><span className={`badge ${ci.status === 'paid' ? 'bg' : 'by'}`}>{ci.status}</span></td>
                    <td>{ci.paid ? <span className="badge bg">✓ Paid</span> : <button className="btn btn-ghost btn-sm" style={{ color: 'var(--green)', fontSize: 11 }} onClick={async () => { await db(entity).from('commission_invoices').update({ paid: true }).eq('id', ci.id); loadSaved(); }}>Mark Paid</button>}</td>
                  </tr>
                ))
              }
            </tbody>
          </table>
        </div>
      ) : generatedDoc ? (
        // Step 4: Documents ready
        <div>
          <div style={{ textAlign: 'center', padding: '20px 0 16px' }}>
            <div style={{ fontSize: 44, marginBottom: 12 }}>✅</div>
            <div style={{ fontSize: 17, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 6 }}>Commission Documents Generated!</div>
            <div style={{ fontSize: 13, color: 'var(--text-muted)' }}>{generatedDoc.ref} — Total Commission: <strong style={{ color: 'var(--green)' }}>{fmtUSD(generatedDoc.total)}</strong></div>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 24, maxWidth: 600, margin: '0 auto 24px' }}>
            {[
              { label: `📊 Commission Statement — ${generatedDoc.ref}`, content: generatedDoc.stmt, filename: `${generatedDoc.ref}_CommissionStatement.txt`, desc: 'Detailed breakdown by item — internal reference' },
              { label: `📄 KAANAL Invoice — ${generatedDoc.invoiceNo}`, content: generatedDoc.invoice, filename: `${generatedDoc.invoiceNo}.txt`, desc: 'Simple invoice sent to Arte Linea' },
            ].map((doc, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 18px', background: 'var(--navy)', border: '1px solid var(--navy-border)', borderRadius: 12 }}>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text-primary)' }}>{doc.label}</div>
                  <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 2 }}>{doc.desc}</div>
                </div>
                <button className="btn btn-secondary btn-sm" onClick={() => download(doc.content, doc.filename)}>⬇ Download</button>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
            <button className="btn btn-primary" onClick={() => { download(generatedDoc.stmt, `${generatedDoc.ref}_CommissionStatement.txt`); download(generatedDoc.invoice, `${generatedDoc.invoiceNo}.txt`); }}>⬇ Download Both</button>
            <button className="btn btn-secondary" onClick={() => { setGeneratedDoc(null); setItems([]); setShipmentRef(''); setInvoiceNumber(''); }}>+ New Commission Invoice</button>
          </div>
        </div>
      ) : (
        // New commission invoice form
        <div>
          {/* Header info */}
          <div className="card">
            <div className="grid2">
              <div className="form-group">
                <label className="form-label">Shipment Reference *</label>
                <input className="form-input" value={shipmentRef} onChange={e => setShipmentRef(e.target.value)} placeholder="e.g. AT-2346" />
              </div>
              <div className="form-group">
                <label className="form-label">Invoice Number *</label>
                <input className="form-input" value={invoiceNumber} onChange={e => setInvoiceNumber(e.target.value)} placeholder="e.g. KAANAL20260507" />
              </div>
              <div className="form-group">
                <label className="form-label">Shipment Date</label>
                <input type="date" className="form-input" value={shipmentDate} onChange={e => setShipmentDate(e.target.value)} />

              <div className="form-group">
                <label className="form-label">Via</label>

            {/* Upload commission file */}
            <div style={{ borderTop: '1px solid var(--border)', paddingTop: 14, marginTop: 4 }}>

              <input type="file" accept=".xlsx,.xls" onChange={async e => {
                if (!e.target.files[0]) return;

          </div>

          {/* Items table */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
            <div className="sh-title">Commission Items ({items.length} items)</div>
            <button className="btn btn-secondary btn-sm" onClick={addItem}>+ Add Row</button>
          </div>

          {items.length === 0 ? (
            <div className="card" style={{ textAlign: 'center', padding: 40, color: 'var(--text-muted)' }}>
              <div style={{ fontSize: 24, marginBottom: 10 }}>📂</div>
              Upload a commission Excel file above, or click "+ Add Row" to enter items manually
            </div>
          ) : (
            <div className="table-wrap" style={{ marginBottom: 14 }}>
              <table>
                <thead>
                  <tr>
                    <th>Order No.</th>
                    <th>Supplier / Factory</th>
                    <th>Item Name</th>
                    <th>Sea/Air</th>
                    <th>Unit Price</th>
                    <th>Qty (mts)</th>
                    <th>Total Amount</th>
                    <th style={{ color: 'var(--gold)' }}>Comm %</th>
                    <th style={{ color: 'var(--green)' }}>Commission</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {items.map((item, i) => (
                    <tr key={i}>
                      <td><input className="form-input" style={{ fontSize: 11, padding: '3px 6px', width: 85 }} value={item.order_no} onChange={e => upItem(i,'order_no',e.target.value)} placeholder="PO-xxxx" /></td>
                      <td><input className="form-input" style={{ fontSize: 11, padding: '3px 6px', width: 110 }} value={item.supplier} onChange={e => {
                        upItem(i,'supplier',e.target.value);
                        // Auto-suggest commission %
                        const hint = COMM_PCT_HINTS[e.target.value.toUpperCase().split(' ')[0]];
                        if (hint) upItem(i,'commission_pct',hint);
                      }} placeholder="Factory name" /></td>
                      <td><input className="form-input" style={{ fontSize: 11, padding: '3px 6px', minWidth: 160 }} value={item.item_name} onChange={e => upItem(i,'item_name',e.target.value)} /></td>
                      <td><select className="form-input" style={{ fontSize: 11, padding: '3px 6px', width: 65 }} value={item.sea_air} onChange={e => upItem(i,'sea_air',e.target.value)}><option>SEA</option><option>AIR</option></select></td>
                      <td><input type="number" className="form-input" style={{ fontSize: 11, padding: '3px 6px', width: 75 }} value={item.unit_price} onChange={e => upItem(i,'unit_price',e.target.value)} step="0.0001" /></td>
                      <td><input type="number" className="form-input" style={{ fontSize: 11, padding: '3px 6px', width: 80 }} value={item.qty} onChange={e => upItem(i,'qty',e.target.value)} step="0.1" /></td>
                      <td className="td-amt" style={{ fontSize: 11 }}>{fmtNum(item.total_amount||0,2)}</td>
                      <td>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                          <input type="number" className="form-input" style={{ fontSize: 11, padding: '3px 6px', width: 50, borderColor: 'var(--gold)' }} value={item.commission_pct} onChange={e => upItem(i,'commission_pct',e.target.value)} min="1" max="10" />
                          <span style={{ fontSize: 11, color: 'var(--gold)' }}>%</span>
                        </div>
                      </td>
                      <td className="td-amt" style={{ fontSize: 11, fontWeight: 600, color: 'var(--green)' }}>{fmtNum(item.commission_amount||0,4)}</td>
                      <td><button className="btn btn-ghost btn-sm" style={{ color: 'var(--red)' }} onClick={() => setItems(p => p.filter((_,idx) => idx !== i))}>✕</button></td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr>
                    <td colSpan={6} style={{ textAlign: 'right', fontWeight: 600, padding: '10px 13px', color: 'var(--text-primary)' }}>Totals:</td>
                    <td className="td-amt" style={{ fontWeight: 700 }}>{fmtUSD(totalAmt)}</td>
                    <td />
                    <td className="td-amt" style={{ fontWeight: 700, color: 'var(--green)', fontSize: 14 }}>{fmtUSD(totalCommission)}</td>
                    <td />
                  </tr>
                </tfoot>
              </table>
            </div>
          )}

          {items.length > 0 && (
            <div className="alert alert-info" style={{ fontSize: 12 }}>
              💡 Commission rates auto-suggested by factory. Adjust per item if needed. KAANAL invoice will show single total: <strong>{fmtUSD(totalCommission)}</strong>
            </div>
          )}

          <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10, marginTop: 16 }}>
            <button className="btn btn-primary btn-lg" onClick={saveAndGenerate} disabled={saving || items.length === 0}>
              {saving ? '⏳ Generating...' : `✅ Save & Generate Commission Invoice (${fmtUSD(totalCommission)})`}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

function Router({ page, setPage }) {
  const title = PAGE_TITLES[page] || page;
  const content = (() => {
    switch (page) {
      case 'dashboard': return <Dashboard setPage={setPage} />;
      case 'alerts': return <Alerts />;
      case 'customer-orders': return <CustomerOrders />;
      case 'invoices': return <Invoices />;
      case 'osr': return <OSR />;
      case 'payments': return <Payments />;
      case 'notes': return <Notes />;
      case 'commission': return <Commission />;
      case 'pl': return <PLReport />;
      case 'ledger': return <Ledger />;
      case 'customers': return <Customers />;
      case 'factories': return <Factories />;
      default: return <ComingSoon title={title} />;
    }
  })();
  return <Layout title={title} page={page} setPage={setPage}>{content}</Layout>;
}

// ─── ROOT ────────────────────────────────────────────────────
function App() {
  const [entity, setEntityState] = useState(() => localStorage.getItem('kaan_entity') || 'HK');
  const [user, setUser] = useState(() => { try { return JSON.parse(localStorage.getItem('kaan_user') || 'null'); } catch { return null; } });
  const [page, setPage] = useState('dashboard');

  function setEntity(e) { setEntityState(e); localStorage.setItem('kaan_entity', e); }
  function login(u) { setUser(u); localStorage.setItem('kaan_user', JSON.stringify(u)); }
  function logout() { setUser(null); localStorage.removeItem('kaan_user'); }

  if (!user) return (
    <Ctx.Provider value={{ entity, setEntity, user, login, logout }}>
      <Login />
    </Ctx.Provider>
  );

  return (
    <Ctx.Provider value={{ entity, setEntity, user, login, logout }}>
      <Router page={page} setPage={setPage} />
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
