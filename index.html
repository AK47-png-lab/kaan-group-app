// Determine brand for Telares based on PO number
// Dicatex: PO-xxxx (e.g. PO-1345, PO-1346)
// Formatex: PO-xxx without DIC prefix, or higher numbers (PO-809, PO-810)
function getTelaresBrand(poNumber) {
  if (!poNumber) return 'dicatex'; // default
  const po = String(poNumber).toUpperCase();
  // Dicatex orders are typically lower PO numbers (PO-1xxx range)
  // Formatex orders are typically (PO-8xx, PO-9xx range)
  // Best approach: check the number range
  const match = po.match(/PO[-\s]*(\d+)/i);
  if (match) {
    const num = parseInt(match[1]);
    // Based on examples: Dicatex = PO-1345, PO-1346; Formatex = PO-809, PO-810
    if (num >= 800 && num < 900) return 'formatex';
    if (num >= 1300) return 'dicatex';
  }
  return 'dicatex'; // default
}

function lookupPrice(itemName, customerCode, poNumber) {
  if (!itemName) return null;
  const name = itemName.toUpperCase().trim();
  // Try exact match first
  let entry = null;
  if (PRICE_DB[name]) entry = PRICE_DB[name];
  else {
    // Try partial match
    for (const [key, val] of Object.entries(PRICE_DB)) {
      if (name.includes(key.split(' ')[0]) || key.includes(name.split(' ')[0])) {
        entry = val; break;
      }
    }
  }
  if (!entry) return null;
  const priceInfo = entry[customerCode];
  if (!priceInfo) return null;
  
  // Special handling for Telares (C) - use brand-specific price
  if (customerCode === 'C' && priceInfo.dicatex_price) {
    const brand = getTelaresBrand(poNumber);
    return {
      ...priceInfo,
      customer_price: brand === 'formatex' ? priceInfo.formatex_price : priceInfo.dicatex_price,
      brand: brand,
      commission_pct: brand === 'formatex' ? 5 : 3,
    };
  }
  return priceInfo;
}


function getCustomerCode(customerId, customers) {
  const c = customers.find(c => c.id === customerId);
  return c ? c.code : '';
}

// Read all sheets from an Excel file, returns { sheetName: [[row data]] }
async function readAllSheets(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = new Uint8Array(e.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const result = {};
        wb.SheetNames.forEach(name => {
          result[name] = XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1, defval: '' });
        });
        resolve(result);
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

// Find header row index (row with most non-empty cells in first 15 rows)
// ─── SMART EXTRACTION ENGINE ─────────────────────────────────
// ─── COMPLETE EXTRACTION ENGINE ──────────────────────────────
// Supports: Bangde, HaiHong, Feifan, Daikun, Decoration, E-TEX,
//           Buwei, ALNO, NG/Neogold, Mingrong, Miju, Tonghui,
//           Tonghao, Beyond, Xinrun, Leji and generic formats

function findHeaderRow(rows) {
  let best = 0, bestScore = 0;
  rows.slice(0, 20).forEach((row, i) => {
    const text = row.map(c => String(c||'').toUpperCase()).join(' ');
    let score = 0;
    if (text.match(/\bITEM\b|\bDESCRIPTION\b|\bDESIGN\b|\bFABRIC\b/)) score += 3;
    if (text.match(/\bQTY\b|\bQUANTITY\b|\bMETER\b|\bMTRS?\b|\bMTS\b/)) score += 3;
    if (text.match(/\bPRICE\b|\bAMOUNT\b|\bFOB\b/)) score += 2;
    if (text.match(/\bCOLOU?R\b|\bCOL\b/)) score += 2;
    if (text.match(/\bORDER\b|\bROLL\b|\bPO\b/)) score += 1;
    if (text.match(/N\.?W\.?|G\.?W\.?|GROSS|NET/)) score += 1;
    if (score > bestScore) { bestScore = score; best = i; }
  });
  return best;
}

function detectFactoryFormat(rows) {
  const allText = rows.slice(0, 25).flat().map(c => String(c||'').toUpperCase()).join(' ');
  if (allText.includes('UNIT PRICE ($/M)') || allText.includes('UNIT PRICE ($')) return 'feifan';
  if (allText.includes('DESCRIPTIONS') && allText.includes('ORDER NO.')) return 'haihong';
  if (allText.includes('ARTNO') || allText.includes('QLTYNO')) return 'daikun';
  if (allText.includes('UNIT/PRICE')) return 'bangde';
  if (allText.includes('FOB $/M') || (allText.includes('DESIGN') && allText.includes('COLOR') && allText.includes('QUANTITY (MTS)'))) return 'etex';
  if (allText.includes('MARKS & NO') || allText.includes('DESCRIPTION OF COMMODITY')) return 'miju';
  if (allText.includes('PO/NO') && allText.includes('DESIGN')) return 'neogold';
  if (allText.includes('NET METER') && allText.includes('ROLL NO')) return 'mingrong';
  if (allText.includes('WIDTH(CM)') && allText.includes('QUANTITY(M)') && allText.includes('UNIT PRICE')) return 'hdp';
  if (allText.includes("SENSEILON") || allText.includes('VPF') || allText.includes('NET QTY(M)')) return 'senseilon';
  if (allText.includes('品名') && (allText.includes('单价') || allText.includes('总值'))) return 'runfun';
  if (allText.includes('CONTRACT NO') || allText.includes('CONISGNEE') || allText.includes('CONSIGNEE')) return 'generic';
  if ((allText.includes('ITEM NO') && allText.includes('COLOUR NO')) || (allText.includes('PO NUMBER') && allText.includes('UNITE PRICE'))) return 'feifan_style';
  return 'generic';
}

function findCol(headers, keywords) {
  for (const kw of keywords) {
    const idx = headers.findIndex(h => String(h||'').toUpperCase().includes(kw));
    if (idx >= 0) return idx;
  }
  return -1;
}

function extractPI(rows, factoryName) {
  const items = [];
  const fmt = detectFactoryFormat(rows);
  console.log('PI format:', fmt, '|', factoryName);

  if (fmt === 'feifan' || fmt === 'feifan_style') {
    // Feifan, Buwei, Beyond, Xinrun, Leji, Run&Fun
    // Cols: S/N | Item NO. | Colour No. | Quantity (MTS/M) | Unit Price | Amount | [Order No]
    const hi = findHeaderRow(rows);
    const headers = rows[hi].map(c => String(c||'').toUpperCase());
    // Row below header sometimes has sub-headers
    const nextRow = rows[hi+1] ? rows[hi+1].map(c => String(c||'').toUpperCase()) : [];
    const dc = findCol(headers, ['ITEM NO','ITEM','DESCRIPTION','DESIGN','FABRIC']);
    const cc = findCol(headers, ['COLOUR NO','COLOUR','COLOR','COL']);
    const qc = findCol(headers, ['QUANTITY','QTY','METER','MTS','M)']);
    const pc = findCol(headers, ['UNIT PRICE','PRICE']);
    const oc = findCol(headers, ['ORDER','PO','KAAN','CONTRACT']);
    for (let i = hi+1; i < rows.length; i++) {
      const row = rows[i];
      const desc = dc >= 0 ? String(row[dc]||'').trim() : '';
      const qty = qc >= 0 ? parseFloat(row[qc]) || 0 : 0;
      const price = pc >= 0 ? parseFloat(row[pc]) || 0 : 0;
      if (!isValidItem(desc, qty, price)) continue;
      items.push({ description: desc, color: cc >= 0 ? String(row[cc]||'').trim() : '', quantity: qty, factory_price: price, net_weight: 0, gross_weight: 0, order_number: oc >= 0 ? String(row[oc]||'').trim() : '', factory_name: factoryName });
    }

  } else if (fmt === 'haihong') {
    // HaiHong: Row N = ORDER NO. | ITEM | COLOR ... Row N+1 data starts
    let dataStart = -1;
    for (let i = 0; i < Math.min(rows.length, 20); i++) {
      if (String(rows[i][0]||'').toUpperCase().includes('ORDER NO')) { dataStart = i + 1; break; }
    }
    if (dataStart < 0) dataStart = findHeaderRow(rows) + 1;
    for (let i = dataStart; i < rows.length; i++) {
      const row = rows[i];
      const orderNo = String(row[0]||'').trim();
      const itemRaw = String(row[1]||'').trim();
      if (!orderNo || !itemRaw || !orderNo.match(/KAAN/i)) continue;
      if (orderNo.toUpperCase().includes('TOTAL')) continue;
      const qty = parseFloat(row[4]) || 0;
      const price = parseFloat(row[6]) || 0;
      if (!qty && !price) continue;
      const parts = itemRaw.split(' ');
      const color = parts.length > 1 ? parts[parts.length-1] : '';
      const desc = parts.length > 1 ? parts.slice(0,-1).join(' ') : itemRaw;
      items.push({ description: desc, color, quantity: qty, factory_price: price, net_weight: 0, gross_weight: 0, order_number: orderNo, factory_name: factoryName });
    }

  } else if (fmt === 'daikun') {
    // Daikun & Decoration: item+color+order merged in col0 "KAAN 1300 VIXY SAND"
    // Header row has DESCRIPTION | ARTNO/QLTYNO | QUANTITY | UNIT PRICE
    let headerRow = -1;
    for (let i = 0; i < rows.length; i++) {
      const text = rows[i].map(c => String(c||'').toUpperCase()).join(' ');
      if ((text.includes('DESCRIPTION') || text.includes('ARTNO') || text.includes('QLTYNO')) && text.includes('QUANTITY') && text.includes('UNIT PRICE')) { headerRow = i; break; }
    }
    if (headerRow < 0) headerRow = findHeaderRow(rows);
    const headers = rows[headerRow].map(c => String(c||'').toUpperCase());
    const qcIdx = findCol(headers, ['QUANTITY','QTY','MTRS','METER']);
    const pcIdx = findCol(headers, ['UNIT PRICE','PRICE','FOB']);
    for (let i = headerRow+2; i < rows.length; i++) {
      const row = rows[i];
      const col0 = String(row[0]||'').trim();
      if (!col0 || !col0.match(/KAAN/i)) continue;
      if (col0.match(/^(TOTAL|THE GOODS|BENEFICIARY|FROM|PACKAGE|SHIPMENT|SUPPLIER|100%|92%|POLYESTER|SAY)/i)) continue;
      const qty = qcIdx >= 0 ? parseFloat(row[qcIdx]) || 0 : parseFloat(row[4]) || 0;
      const price = pcIdx >= 0 ? parseFloat(row[pcIdx]) || 0 : parseFloat(row[6]) || 0;
      if (!qty && !price) continue;
      // Parse "KAAN 1300 VIXY SAND" -> order=KAAN 1300, desc=VIXY, color=SAND
      const match = col0.match(/^(KAAN\s+[\w-]+)\s+(.+?)\s+(\S+)$/i);
      let desc = col0, color = '', orderNo = '';
      if (match) { orderNo = match[1]; desc = match[2]; color = match[3]; }
      items.push({ description: desc, color, quantity: qty, factory_price: price, net_weight: 0, gross_weight: 0, order_number: orderNo, factory_name: factoryName });
    }

  } else if (fmt === 'etex') {
    // E-TEX: Description | PO | Design | Color | Quantity (Mts) | Unit Price (FOB $/M) | Total
    const hi = findHeaderRow(rows);
    const headers = rows[hi].map(c => String(c||'').toUpperCase());
    const oc = findCol(headers, ['PO','ORDER']);
    const dc = findCol(headers, ['DESIGN','ITEM','DESCRIPTION']);
    const cc = findCol(headers, ['COLOR','COLOUR']);
    const qc = findCol(headers, ['QUANTITY','QTY','MTS','METER']);
    const pc = findCol(headers, ['UNIT PRICE','PRICE']);
    for (let i = hi+1; i < rows.length; i++) {
      const row = rows[i];
      const desc = dc >= 0 ? String(row[dc]||'').trim() : '';
      const qty = qc >= 0 ? parseFloat(row[qc]) || 0 : 0;
      const price = pc >= 0 ? parseFloat(row[pc]) || 0 : 0;
      if (!isValidItem(desc, qty, price)) continue;
      items.push({ description: desc, color: cc >= 0 ? String(row[cc]||'').trim() : '', quantity: qty, factory_price: price, net_weight: 0, gross_weight: 0, order_number: oc >= 0 ? String(row[oc]||'').trim() : '', factory_name: factoryName });
    }

  } else if (fmt === 'miju') {
    // Miju: Marks & No. | PO# | Description | Mill's Code | Quantity(M) | Roll | N.W | G.W
    // Data rows have STYLE/COLOR/YARD/ROLL# labels mixed in - skip those
    const hi = findHeaderRow(rows);
    const headers = rows[hi].map(c => String(c||'').toUpperCase());
    const oc = findCol(headers, ['PO#','PO','ORDER','KAAN']);
    const dc = findCol(headers, ['DESCRIPTION','COMMODITY','ITEM','DESIGN']);
    const qc = findCol(headers, ['QUANTITY','QTY','M)','METER']);
    const pc = findCol(headers, ['UNIT PRICE','PRICE']);
    for (let i = hi+1; i < rows.length; i++) {
      const row = rows[i];
      const orderNo = oc >= 0 ? String(row[oc]||'').trim() : '';
      const desc = dc >= 0 ? String(row[dc]||'').trim() : '';
      // Skip label rows
      if (!orderNo.match(/KAAN/i) && !desc) continue;
      if (['STYLE','COLOR','COLOUR','YARD','ROLL#','LOT#','COUNTRY'].includes(String(row[0]||'').toUpperCase().trim())) continue;
      const qty = qc >= 0 ? parseFloat(row[qc]) || 0 : 0;
      const price = pc >= 0 ? parseFloat(row[pc]) || 0 : 0;
      if (!isValidItem(desc, qty, price)) continue;
      items.push({ description: desc, color: '', quantity: qty, factory_price: price, net_weight: 0, gross_weight: 0, order_number: orderNo, factory_name: factoryName });
    }

  } else if (fmt === 'neogold') {
    // NG/Neogold: PO/NO. | DESIGN | QUANTITY | M | UNIT PRICE | AMOUNT
    const hi = findHeaderRow(rows);
    const headers = rows[hi].map(c => String(c||'').toUpperCase());
    const oc = findCol(headers, ['PO/NO','PO NO','ORDER','KAAN']);
    const dc = findCol(headers, ['DESIGN','ITEM','DESCRIPTION']);
    const qc = findCol(headers, ['QUANTITY','QTY']);
    const pc = findCol(headers, ['UNIT PRICE','PRICE']);
    for (let i = hi+1; i < rows.length; i++) {
      const row = rows[i];
      const desc = dc >= 0 ? String(row[dc]||'').trim() : '';
      const qty = qc >= 0 ? parseFloat(row[qc]) || 0 : 0;
      const price = pc >= 0 ? parseFloat(row[pc]) || 0 : 0;
      if (!isValidItem(desc, qty, price)) continue;
      items.push({ description: desc, color: '', quantity: qty, factory_price: price, net_weight: 0, gross_weight: 0, order_number: oc >= 0 ? String(row[oc]||'').trim() : '', factory_name: factoryName });
    }

  } else if (fmt === 'hdp') {
    // HDP (HuangDaoPo): DESCRIPTION | COLOR | WIDTH(CM) | QUANTITY(M) | COMPOSITION | UNIT PRICE | TOTAL
    const hi = findHeaderRow(rows);
    const headers = rows[hi].map(c => String(c||'').toUpperCase());
    const dc = findCol(headers, ['DESCRIPTION','ITEM','DESIGN','NAME']);
    const cc = findCol(headers, ['COLOR','COLOUR']);
    const qc = findCol(headers, ['QUANTITY(M)','QUANTITY','QTY']);
    const pc = findCol(headers, ['UNIT PRICE','PRICE']);
    for (let i = hi+1; i < rows.length; i++) {
      const row = rows[i];
      const desc = dc >= 0 ? String(row[dc]||'').trim() : '';
      const qty = qc >= 0 ? parseFloat(row[qc]) || 0 : 0;
      const price = pc >= 0 ? parseFloat(row[pc]) || 0 : 0;
      if (!isValidItem(desc, qty, price)) continue;
      items.push({ description: desc, color: cc >= 0 ? String(row[cc]||'').trim() : '', quantity: qty, factory_price: price, net_weight: 0, gross_weight: 0, order_number: '', factory_name: factoryName });
    }

  } else if (fmt === 'runfun') {
    // Run&Fun: ORDER NO. | 品名 (item) | 数量 (qty) | 单价 (price) | 总值 (amount)
    const hi = findHeaderRow(rows);
    const headers = rows[hi].map(c => String(c||'').toUpperCase());
    const oc = findCol(headers, ['ORDER NO','ORDER','KAAN','订单']);
    const dc = findCol(headers, ['品名','DESCRIPTIONS','DESCRIPTION','ITEM']);
    const qc = findCol(headers, ['数量','QUANTITIES','QUANTITY','QTY','MTS']);
    const pc = findCol(headers, ['单价','UNIT PRICE','PRICE']);
    for (let i = hi+1; i < rows.length; i++) {
      const row = rows[i];
      const desc = dc >= 0 ? String(row[dc]||'').trim() : '';
      const qty = qc >= 0 ? parseFloat(row[qc]) || 0 : 0;
      const price = pc >= 0 ? parseFloat(row[pc]) || 0 : 0;
      if (!isValidItem(desc, qty, price)) continue;
      items.push({ description: desc, color: '', quantity: qty, factory_price: price, net_weight: 0, gross_weight: 0, order_number: oc >= 0 ? String(row[oc]||'').trim() : '', factory_name: factoryName });
    }

  } else {
    // Generic - Bangde, Tonghui, Tonghao, ALNO (when Excel available)
    const hi = findHeaderRow(rows);
    const headers = rows[hi].map(c => String(c||'').toUpperCase().trim());
    const dc = findCol(headers, ['ITEM','DESCRIPTION','FABRIC','DESIGN','QUALITY','PRODUCT','NAME']);
    const cc = findCol(headers, ['COLOR','COLOUR','COL']);
    const qc = findCol(headers, ['QTY(M)','QUANTITY    (M)','QUANTITY','QTY','METER','MTS','M)','LENGTH']);
    const pc = findCol(headers, ['UNIT/PRICE','UNIT PRICE','FOB PRICE','PRICE USD','FOB USD','PRICE/M','UNIT COST','PRICE']);
    const nwc = findCol(headers, ['N.W.(KGS)','N.W.','NET WEIGHT','NET WT']);
    const gwc = findCol(headers, ['G.W.(KGS','G.W.','GROSS WEIGHT','GROSS WT']);
    const oc = findCol(headers, ['ORDER NO','ORDER No','PO NO','KAAN','ORDER','CONTRACT']);
    for (let i = hi+1; i < rows.length; i++) {
      const row = rows[i];
      const desc = dc >= 0 ? String(row[dc]||'').trim() : '';
      const qty = qc >= 0 ? parseFloat(row[qc]) || 0 : 0;
      const price = pc >= 0 ? parseFloat(row[pc]) || 0 : 0;
      if (!isValidItem(desc, qty, price)) continue;
      items.push({ description: desc, color: cc >= 0 ? String(row[cc]||'').trim() : '', quantity: qty, factory_price: price, net_weight: nwc >= 0 ? parseFloat(row[nwc])||0 : 0, gross_weight: gwc >= 0 ? parseFloat(row[gwc])||0 : 0, order_number: oc >= 0 ? String(row[oc]||'').trim() : '', factory_name: factoryName });
    }
  }
  return items;
}

function extractPL(rows) {
  const items = [];
  const fmt = detectFactoryFormat(rows);

  if (fmt === 'haihong') {
    let dataStart = -1;
    for (let i = 0; i < rows.length; i++) {
      const text = rows[i].map(c => String(c||'').toUpperCase()).join(' ');
      if (text.includes('QUANTITY') && (text.includes('PACKAGES') || text.includes('N/W'))) { dataStart = i+1; break; }
    }
    if (dataStart < 0) return items;
    for (let i = dataStart; i < rows.length; i++) {
      const row = rows[i];
      const desc = String(row[0]||'').trim();
      if (!desc || SKIP_PATTERNS.test(desc)) continue;
      const qty = parseFloat(row[2]) || 0;
      if (!qty) continue;
      items.push({ description: desc, color: '', quantity: qty, packages: parseFloat(row[4])||0, net_weight: parseFloat(row[6])||0, gross_weight: parseFloat(row[8])||0, cbm: parseFloat(row[10])||0, order_number: '' });
    }
  } else if (fmt === 'daikun') {
    let dataStart = -1;
    for (let i = 0; i < rows.length; i++) {
      const text = rows[i].map(c => String(c||'').toUpperCase()).join(' ');
      if (text.includes('PACK') && text.includes('QUANTITY')) { dataStart = i+1; break; }
    }
    if (dataStart < 0) return items;
    for (let i = dataStart; i < rows.length; i++) {
      const row = rows[i];
      const col0 = String(row[0]||'').trim();
      if (!col0 || !col0.match(/KAAN/i)) continue;
      const match = col0.match(/^(KAAN\s+[\w-]+)\s+(.+?)\s+(\S+)$/i);
      let desc = col0, color = '';
      if (match) { desc = match[2]; color = match[3]; }
      items.push({ description: desc, color, quantity: parseFloat(row[4])||0, packages: parseFloat(row[2])||0, net_weight: parseFloat(row[7])||0, gross_weight: parseFloat(row[6])||0, cbm: parseFloat(row[8])||0, order_number: '' });
    }
  } else {
    // Generic + all others
    const hi = findHeaderRow(rows);
    const headers = rows[hi].map(c => String(c||'').toUpperCase().trim());
    const dc = findCol(headers, ['ITEM NO','ITEM','DESCRIPTION','FABRIC','DESIGN','NAME','QUALITY','COMMODITY']);
    const cc = findCol(headers, ['COLOUR NO','COLOUR','COLOR','COL']);
    const qc = findCol(headers, ['QUANTITY (M)','QUANTITY    (M)','QTY(M)','QUANTITY','QTY','METER','MTS','METERS']);
    const pkc = findCol(headers, ['ROLLS','ROLL','PACKAGE','PKG','CARTON','CTN','BALE']);
    const nwc = findCol(headers, ['NT WT','N.W.(KGS)','N.W.','NET WEIGHT','NET WT','NT WTN','NW','N.W']);
    const gwc = findCol(headers, ['GROSS WEIGHT','G.W.(KGS','G.W.','GROSS WT','GW','G.W']);
    const cbmc = findCol(headers, ['MEAS.','CBM','VOLUME','M3','VOL']);
    const oc = findCol(headers, ['ORDER NO','ORDER No','PO#','PO NO','KAAN','ORDER','CONTRACT']);
    for (let i = hi+1; i < rows.length; i++) {
      const row = rows[i];
      const desc = dc >= 0 ? String(row[dc]||'').trim() : '';
      const qty = qc >= 0 ? parseFloat(row[qc]) || 0 : 0;
      const pkg = pkc >= 0 ? parseFloat(row[pkc])||0 : 0;
      if (!desc || SKIP_PATTERNS.test(desc) || (!qty && !pkg)) continue;
      items.push({ description: desc, color: cc >= 0 ? String(row[cc]||'').trim() : '', quantity: qty, packages: pkg, net_weight: nwc >= 0 ? parseFloat(row[nwc])||0 : 0, gross_weight: gwc >= 0 ? parseFloat(row[gwc])||0 : 0, cbm: cbmc >= 0 ? parseFloat(row[cbmc])||0 : 0, order_number: oc >= 0 ? String(row[oc]||'').trim() : '' });
    }
  }
  return items;
}

function extractDPL(rows, factoryName) {
  const items = [];
  // Check for Daikun multi-column DPL
  const row0 = rows[0] ? rows[0].map(c => String(c||'').toUpperCase()) : [];
  const row2 = rows[2] ? rows[2].map(c => String(c||'').toUpperCase()) : [];
  const isDaikunDPL = row0.some(c => c.includes('KAAN')) && row2.some(c => c.match(/\bNO\b|\bLOT\b|\bMTR/));
  if (isDaikunDPL) {
    for (let col = 0; col < (rows[0] || []).length; col += 4) {
      const itemName = String(rows[0][col]||'').trim();
      if (!itemName || !itemName.match(/KAAN/i)) continue;
      const color = String(rows[1] && rows[1][col]||'').trim();
      const match = itemName.match(/^(KAAN\s+[\w-]+)\s+(.+)$/i);
      const order = match ? match[1] : '';
      const desc = match ? match[2] : itemName;
      for (let row = 3; row < rows.length; row++) {
        const rollNo = String(rows[row][col]||'').replace('#','').trim();
        const qty = parseFloat(rows[row][col+2]) || 0;
        if (!rollNo || !qty) continue;
        items.push({ description: desc, color, roll_number: rollNo, quantity_mts: qty, lot: String(rows[row][col+1]||'').trim(), order_number: order, factory_name: factoryName });
      }
    }
    return items;
  }

  // Senseilon DPL: NO | Item Name | Color | VPF Code | Batch | Roll NO | Net QTY(M)
  const allDplText = rows.slice(0, 5).flat().map(c => String(c||'').toUpperCase()).join(' ');
  if (allDplText.includes('SENSEILON') || allDplText.includes('NET QTY(M)') || allDplText.includes('VPF')) {
    const hi = findHeaderRow(rows);
    const headers = rows[hi].map(c => String(c||'').toUpperCase().trim());
    const dc = findCol(headers, ["SENSEILON'S ITEM NAME","ITEM NAME","ITEM"]);
    const cc = findCol(headers, ["SENSEILON'S ITEM CODE","COLOR","COLOUR"]);
    const bc = findCol(headers, ['BATCH NO','BATCH']);
    const rc = findCol(headers, ['ROLL NO','ROLL']);
    const qc = findCol(headers, ['NET QTY(M)','QTY(M)','QUANTITY','NET QTY']);
    const oc = findCol(headers, ['REFERENCE PO','PO#','ORDER']);
    for (let i = hi+1; i < rows.length; i++) {
      const row = rows[i];
      const qty = qc >= 0 ? parseFloat(row[qc]) || 0 : 0;
      const rollNo = rc >= 0 ? String(row[rc]||'').trim() : '';
      if (!qty && !rollNo) continue;
      // Parse item name from "SSL-2011" and color from "35 NAVY" pattern
      const rawItem = dc >= 0 ? String(row[dc]||'').trim() : '';
      const rawColor = cc >= 0 ? String(row[cc]||'').trim() : '';
      items.push({ description: rawItem, color: rawColor, roll_number: rollNo || String(i), quantity_mts: qty, lot: bc >= 0 ? String(row[bc]||'').trim() : '', order_number: '', factory_name: factoryName });
    }
    return items;
  }

  // Standard DPL formats (HaiHong, Mingrong, Bangde Chinese, ALNO Chinese, Miju etc.)
  const hi = findHeaderRow(rows);
  const headers = rows[hi].map(c => String(c||'').toUpperCase().trim());
  // Chinese headers: 卷号=roll, 净米=net meters, 缸号=lot, 色号=color, 品名=item
  const oc = findCol(headers, ['CUSTOMER ORDER','ORDER NUMBER','ORDER NO','PO.','PO NO','KAAN','ORDER','客户单号','PO#']);
  const dc = findCol(headers, ['ITEM','DESCRIPTION','FABRIC','DESIGN','NAME','品名']);
  const cc = findCol(headers, ['COLOUR','COLOR','COL','颜色号','颜色','色号']);
  const rc = findCol(headers, ['ROLL NUMBER','ROLL NO','ROLL#','ROLL','卷号','ROLL NO.']);
  const lc = findCol(headers, ['LOT NO','LOT','BATCH','DYE LOT','缸号','LOT NO.']);
  const qc = findCol(headers, ['N.METER','NET METER','净米','QTY(M)','QUANTITY','QTY','METER','MTR','LENGTH','MTS','NET(M)','NET M']);

  for (let i = hi+1; i < rows.length; i++) {
    const row = rows[i];
    const qty = qc >= 0 ? parseFloat(row[qc]) || 0 : 0;
    const rollNo = rc >= 0 ? String(row[rc]||'').trim() : '';
    const desc = dc >= 0 ? String(row[dc]||'').trim() : '';
    if (!qty && !rollNo) continue;
    if (SKIP_PATTERNS.test(String(desc||rollNo||''))) continue;
    if (String(desc).toUpperCase().includes('TOTAL') || String(rollNo).toUpperCase().includes('TOTAL')) continue;
    items.push({ description: desc, color: cc >= 0 ? String(row[cc]||'').trim() : '', roll_number: rollNo || String(i-hi), quantity_mts: qty, lot: lc >= 0 ? String(row[lc]||'').trim() : '', order_number: oc >= 0 ? String(row[oc]||'').trim() : '', factory_name: factoryName });
  }
  return items;
}

// Parse a single factory file - reads all sheets and auto-detects types
async function parseFile(file, hint, factoryName) {
  if (!file) return { pi_items: [], pl_items: [], dpl_items: [] };
  try {
    const sheets = await readAllSheets(file);
    let pi_items = [], pl_items = [], dpl_items = [];

    if (Object.keys(sheets).length === 1) {
      // Single sheet - try all types
      const rows = Object.values(sheets)[0];
      const fmt = detectFactoryFormat(rows);
      if (hint === 'dpl' || fmt === 'mingrong') {
        dpl_items = extractDPL(rows, factoryName);
      } else if (hint === 'pl') {
        pl_items = extractPL(rows);
        if (!pl_items.length) pi_items = extractPI(rows, factoryName);
      } else {
        pi_items = extractPI(rows, factoryName);
        if (!pi_items.length) pl_items = extractPL(rows);
        if (!pi_items.length && !pl_items.length) dpl_items = extractDPL(rows, factoryName);
      }
    } else {
      // Multiple sheets - classify each by name and content
      for (const [sheetName, rows] of Object.entries(sheets)) {
        const sn = sheetName.toUpperCase();
        const fmt = detectFactoryFormat(rows);
        const isDPL = sn.includes('DPL') || sn.includes('DETAIL') || sn.includes('明细') || fmt === 'mingrong';
        const isPL = !isDPL && (sn.includes('PL') || sn.includes('PACK') || sn.includes('PACKING'));
        const isPI = !isDPL && !isPL && (sn.includes('INV') || sn.includes('CI') || sn.includes('IV'));

        if (isDPL && !dpl_items.length) {
          const d = extractDPL(rows, factoryName);
          if (d.length) dpl_items = d;
        } else if (isPL && !pl_items.length) {
          const p = extractPL(rows);
          if (p.length) pl_items = p;
        } else if (!pi_items.length) {
          const p = extractPI(rows, factoryName);
          if (p.length) pi_items = p;
        }
      }
      // Fallbacks
      if (!pi_items.length) {
        for (const rows of Object.values(sheets)) {
          const p = extractPI(rows, factoryName);
          if (p.length) { pi_items = p; break; }
        }
      }
      if (!pl_items.length) {
        for (const rows of Object.values(sheets)) {
          const p = extractPL(rows);
          if (p.length) { pl_items = p; break; }
        }
      }
    }

    console.log(factoryName, '→ PI:', pi_items.length, 'PL:', pl_items.length, 'DPL:', dpl_items.length);
    return { pi_items, pl_items, dpl_items };
  } catch(err) {
    console.error('parseFile error', factoryName, err);
    return { pi_items: [], pl_items: [], dpl_items: [], error: err.message };
  }
}


function FactorySearch({ value, onChange, factoryList, style }) {
  const [query, setQuery] = useState(value || '');
  const [open, setOpen] = useState(false);

  const filtered = query.length === 0
    ? factoryList
    : factoryList.filter(f =>
        f.name.toUpperCase().includes(query.toUpperCase()) ||
        (f.short_name && f.short_name.toUpperCase().includes(query.toUpperCase())) ||
        (f.code && f.code.toUpperCase().includes(query.toUpperCase()))
      );

  function select(f) {
    setQuery(f.short_name || f.name);
    onChange(f.short_name || f.name);
    setOpen(false);
  }

  function handleChange(e) {
    setQuery(e.target.value);
    onChange(e.target.value);
    setOpen(true);
  }

  return (
    <div style={{ position: 'relative', ...style }}>
      <input
        className="form-input"
        value={query}
        onChange={handleChange}
        onFocus={() => setOpen(true)}
        onBlur={() => setTimeout(() => setOpen(false), 150)}
        placeholder="Type to search factory (e.g. Beyond, Feifan, Yuanbi)..."
      />
      {open && filtered.length > 0 && (
        <div style={{
          position: 'absolute', top: '100%', left: 0, right: 0, zIndex: 1000,
          background: 'var(--surface)', border: '1px solid var(--accent)', borderRadius: 8,
          maxHeight: 200, overflowY: 'auto', boxShadow: '0 8px 24px rgba(0,0,0,0.4)',
          marginTop: 2
        }}>
          {filtered.slice(0, 15).map(f => (
            <div key={f.id} onMouseDown={() => select(f)} style={{
              padding: '8px 12px', cursor: 'pointer', fontSize: 13,
              borderBottom: '1px solid var(--border)',
              display: 'flex', alignItems: 'center', gap: 10,
            }}
            onMouseEnter={e => e.currentTarget.style.background = 'var(--accent-muted)'}
            onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
              <span style={{ fontWeight: 600, color: 'var(--text-primary)', minWidth: 80 }}>{f.short_name || f.name}</span>
              <span style={{ fontSize: 11, color: 'var(--text-muted)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{f.name}</span>
              <span style={{ fontSize: 10, color: 'var(--text-muted)', marginLeft: 'auto' }}>{f.code}</span>
            </div>
          ))}
          {filtered.length === 0 && (
            <div style={{ padding: '10px 12px', fontSize: 12, color: 'var(--text-muted)' }}>
              No factory found — type to use custom name
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function NewInvoiceModal({ customers, entity, filterType, onClose, onSaved }) {

  const [form, setForm] = useState({
    invoice_number: '', customer_id: '', invoice_date: today(),
    sailing_date: '', payment_terms: '60 days from date of shipment',
    shipping_terms: 'FOB SHANGHAI', port_of_destination: '',
    via: 'OCEAN FREIGHT', goods_description: 'FABRIC',
    container_number: '', bl_number: '', misc_charges: 0, status: 'issued'
  });

    id: 1, name: '', piFile: null, plFile: null, dplFile: null
  }]);
  const [factoryList, setFactoryList] = useState([]); // master factory list for search
  const [items, setItems] = useState([]);
  const [dplItems, setDplItems] = useState([]);
  const [parsing, setParsing] = useState(false);
  const [parseLog, setParseLog] = useState([]);
  const [saving, setSaving] = useState(false);
  const [generatedDocs, setGeneratedDocs] = useState([]);
  const [missingCount, setMissingCount] = useState(0);

  const custCode = getCustomerCode(form.customer_id, customers);

  // Load factory master list for search
  useEffect(() => {
    db(entity).from('factories').select('id,name,short_name,code').order('name').then(r => setFactoryList(r.data || []));
  }, [entity]);
  const hasCCPrices = items.some(i => i.cc_price && +i.cc_price > 0 && +i.cc_price !== +i.unit_price);
  const actualTotal = items.reduce((s,i) => s + ((+i.quantity||0) * (+i.unit_price||0)), 0) + (+form.misc_charges||0);
  const ccTotal = items.reduce((s,i) => s + ((+i.quantity||0) * (+i.cc_price||+i.unit_price||0)), 0) + (+form.misc_charges||0);

  function addFactory() {
    setFactories(p => [...p, { id: Date.now(), name: '', piFile: null, plFile: null, dplFile: null }]);
  }
  function removeFactory(id) { setFactories(p => p.filter(f => f.id !== id)); }
  function updateFactory(id, field, val) { setFactories(p => p.map(f => f.id === id ? {...f, [field]: val} : f)); }
  function upItem(i, field, val) { setItems(p => p.map((item, idx) => idx === i ? {...item, [field]: val} : item)); }

  async function processAllFiles() {
    const hasAny = factories.some(f => f.piFile || f.plFile || f.dplFile);
    if (!hasAny) { alert('Please upload at least one factory document'); return; }
    setParsing(true);
    const log = [];
    const appendLog = (msg) => { log.push(msg); setParseLog([...log]); };

    try {
      let allItems = [], allDpl = [];

      for (const factory of factories) {
        const fname = factory.name || ('Factory ' + (factories.indexOf(factory)+1));
        appendLog('--- ' + fname + ' ---');

        // Track what we extracted per factory
        let piItems = [], plItems = [], dplExtracted = [];

        // Parse all uploaded slots - each independently
        const slotFiles = [
          { file: factory.piFile, hint: 'auto', label: 'File 1 (PI)' },
          { file: factory.plFile, hint: 'pl', label: 'File 2 (PL)' },
          { file: factory.dplFile, hint: 'dpl', label: 'File 3 (DPL)' },
        ].filter(s => s.file);

        for (const slot of slotFiles) {
          appendLog('  Reading ' + slot.label + ': ' + slot.file.name);
          const r = await parseFile(slot.file, slot.hint, fname);
          const gotPi = (r.pi_items || []).length;
          const gotPl = (r.pl_items || []).length;
          const gotDpl = (r.dpl_items || []).length;
          appendLog('    PI:' + gotPi + ' PL:' + gotPl + ' DPL:' + gotDpl);
          if (gotPi === 0 && gotPl === 0) appendLog('    ⚠️ No items found — check console (F12) for header details');
          if (gotPi > piItems.length) piItems = r.pi_items;
          if (gotPl > plItems.length) plItems = r.pl_items;
          if (gotDpl > dplExtracted.length) dplExtracted = r.dpl_items;
        }

        // Fallback: if no PI items, use PL data
        if (!piItems.length && plItems.length) {
          appendLog('  Using PL data as fallback for PI');
          piItems = plItems.map(p => ({ description: p.description, color: p.color, quantity: p.quantity, factory_price: 0, net_weight: p.net_weight, gross_weight: p.gross_weight, order_number: p.order_number, factory_name: fname }));
        }

        appendLog('  ✓ ' + fname + ': ' + piItems.length + ' items, ' + dplExtracted.length + ' DPL rolls');

        // Merge PI + PL for this factory
        piItems.forEach(item => {
          const plItem = plItems.find(p =>
            p.description && item.description &&
            p.description.toUpperCase().includes(item.description.toUpperCase().split(' ')[0])
          ) || {};
          const priceInfo = lookupPrice(item.description, custCode);
          allItems.push({
            description: item.description || '',
            color: item.color || '',
            quantity: item.quantity || 0,
            factory_name: fname,
            factory_price: item.factory_price || 0,
            unit_price: priceInfo && priceInfo.customer_price ? String(priceInfo.customer_price) : '',
            cc_price: '',
            net_weight: item.net_weight || plItem.net_weight || 0,
            gross_weight: item.gross_weight || plItem.gross_weight || 0,
            packages: plItem.packages || 0,
            cbm: plItem.cbm || 0,
            order_number: item.order_number || plItem.order_number || '',
            price_auto: !!(priceInfo && priceInfo.customer_price),
          });
        });

        dplExtracted.forEach(item => allDpl.push({...item, factory_name: fname}));
      }

      appendLog('');
      appendLog('Total: ' + allItems.length + ' items, ' + allDpl.length + ' DPL rolls');

      if (!allItems.length) {
        appendLog('⚠️ No items extracted. Please enter manually or check file format.');
        allItems = [{ description:'',color:'',quantity:0,factory_name:factories[0]?.name||'',factory_price:0,unit_price:'',cc_price:'',net_weight:0,gross_weight:0,packages:0,cbm:0,order_number:'',price_auto:false }];
      }

      setItems(allItems);
      setDplItems(allDpl);
      setMissingCount(allItems.filter(i => i.description && !i.unit_price).length);
      setStep(3);
    } catch(e) {
      console.error(e);
      appendLog('Error: ' + e.message);
      setItems([{ description:'',color:'',quantity:0,factory_name:'',factory_price:0,unit_price:'',cc_price:'',net_weight:0,gross_weight:0,packages:0,cbm:0,order_number:'',price_auto:false }]);
      setStep(3);
    }
    setParsing(false);
  }

  async function saveAndGenerate() {

    try {

      new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 8000))
    ]);
    const custData = custResult.data || {};

    // Save actual invoice
    const invResult = await Promise.race([
      d.from('commercial_invoices').insert({

        customer_id: form.customer_id,
        invoice_date: form.invoice_date,

    ]);

    if (!invResult.data) {
      throw new Error('Failed to save invoice: ' + (invResult.error?.message || 'unknown error'));
    }
    const inv = invResult.data;

    // Save line items (batch)
    const lineItems = items.filter(i => i.description).map((item, idx) => ({
      invoice_id: inv.id, line_no: idx+1,
      description: item.description, color: item.color,
      quantity: +item.quantity||0, unit_price: +item.unit_price||0,

        invoice_number: form.invoice_number + '-CC',
        customer_id: form.customer_id,
        invoice_date: form.invoice_date,
        sailing_date: form.sailing_date || null,
        payment_terms: form.payment_terms,
        shipping_terms: form.shipping_terms,
        entity, invoice_type: 'customs_clearance',
        subtotal: ccTotal - (+form.misc_charges||0),
        total_amount: ccTotal, due_date,
        paired_invoice_id: inv.id,
        cc_vs_actual_diff: ccTotal - actualTotal,
        misc_charges: +form.misc_charges||0,
        status: 'issued'
      }).select().single();

      if (ccResult.data) {
        const ccLines = items.filter(i => i.description).map((item, idx) => ({
          invoice_id: ccResult.data.id, line_no: idx+1,
          description: item.description, color: item.color,
          quantity: +item.quantity||0,
          unit_price: +item.cc_price||+item.unit_price||0,
          net_weight: +item.net_weight||null, gross_weight: +item.gross_weight||null,
        }));
        if (ccLines.length) await d.from('invoice_items').insert(ccLines);
        await d.from('commercial_invoices').update({ paired_invoice_id: ccResult.data.id, cc_vs_actual_diff: ccTotal - actualTotal }).eq('id', inv.id);
      }
    }

    // Build documents - this is pure JS, no network calls
    const docs = [];
    const sep = '─'.repeat(90);
    const custName = custData.name || '';
    const custAddr = [custData.address_line1, custData.city, custData.tax_id ? 'RFC/TAX ID: ' + custData.tax_id : ''].filter(Boolean).join(' | ');

      const rows = lineData.map(i => {
        const d = String(i.description||'').substring(0,36).padEnd(37);
        const c = String(i.color||'').substring(0,10).padEnd(11);
        const q = String(fmtNum(+i.quantity||0,1)).padEnd(10);
        const up = String(fmtNum(+i.unit_price||0,4)).padEnd(12);
        const amt = String(fmtNum((+i.quantity||0)*(+i.unit_price||0),2)).padEnd(12);
        const nw = String(fmtNum(+i.net_weight||0,1)).padEnd(9);
        const gw = fmtNum(+i.gross_weight||0,1);
        return d+c+q+up+amt+nw+gw;
      }).join('\n');
      return [
        co.name, co.address, co.taxId ? 'TAX ID: '+co.taxId : '',
        '', isCC ? 'COMMERCIAL INVOICE (FOR CUSTOMS CLEARANCE ONLY)' : 'COMMERCIAL INVOICE',
        '', 'TO: '+custName, custAddr,
        '', 'INVOICE NO: '+invNum, 'DATE: '+form.invoice_date,
        isCC ? 'FOR CUSTOMS CLEARANCE USE ONLY - NOT FOR PAYMENT' : '',
        'PAYMENT: '+form.payment_terms, 'VIA: '+form.via+' | '+form.shipping_terms,

        form.bl_number ? 'B/L: '+form.bl_number : '',
        form.port_of_destination ? 'PORT OF DESTINATION: '+form.port_of_destination : '',
        '', sep,

        'Clearing Code: '+co.clearingCode, 'Bank: '+co.bankName, 'Swift: '+co.swift,
        '', 'For and on behalf of', co.name, '', '_________________________', 'Authorized Signature(s)'
      ].filter(l => l !== '').join('\n');
    }

    docs.push({ label: '📄 Commercial Invoice — '+form.invoice_number, content: buildCI(form.invoice_number, items.filter(i=>i.description).map(i=>({...i,unit_price:+i.unit_price||0})), actualTotal, false), filename: form.invoice_number+'_CI_Actual.txt' });

      const diff = ccTotal - actualTotal;

        'DATE: '+form.invoice_date, 'REF INVOICE: '+form.invoice_number, 'CC INVOICE: '+form.invoice_number+'-CC', '',
        sep, 'Difference: CC Invoice vs Actual Invoice     '+fmtUSD(diff),
        '(CC: '+fmtUSD(ccTotal)+' minus Actual: '+fmtUSD(actualTotal)+')', sep,

      co.name, co.address, '', 'PACKING LIST', '',

      form.container_number ? 'CONTAINER: '+form.container_number : '', '',

        const nw=String(fmtNum(+i.net_weight||0,1)).padEnd(10); const gw=String(fmtNum(+i.gross_weight||0,1)).padEnd(11);
        const cbm=String(fmtNum(+i.cbm||0,3)).padEnd(9); return d+c+q+p+nw+gw+cbm+(i.order_number||'');

      'TOTAL: '+fmtNum(items.reduce((s,i)=>s+(+i.quantity||0),0),0)+' Mts | '+items.reduce((s,i)=>s+(+i.packages||0),0)+' Pkgs | Net: '+fmtNum(items.reduce((s,i)=>s+(+i.net_weight||0),0),1)+' kgs | Gross: '+fmtNum(items.reduce((s,i)=>s+(+i.gross_weight||0),0),1)+' kgs'
    ].filter(l=>l!=='').join('\n') });

    if (dplItems.length > 0) {
      const sep80 = '─'.repeat(80);
      docs.push({ label: '📋 Detailed Packing List — '+form.invoice_number, filename: form.invoice_number+'_DPL.txt', content: [
        co.name, co.address, '', 'DETAILED PACKING LIST', '',

        sep80, 'ORDER NO.    DESCRIPTION                     ROLL NO.   QTY(Mts)   LOT', sep80,
        ...dplItems.map(i => {
          const on=String(i.order_number||'').padEnd(13); const d=String(i.description||'').substring(0,31).padEnd(32);
          const r=String(i.roll_number||'').padEnd(11); const q=String(fmtNum(+i.quantity_mts||0,1)).padEnd(11);
          return on+d+r+q+(i.lot||'');
        }),
        sep80, 'TOTAL: '+fmtNum(dplItems.reduce((s,i)=>s+(+i.quantity_mts||0),0),1)+' Mts | '+dplItems.length+' Rolls'
      ].join('\n') });
    }

    // Save to archive in background - don't block document generation
    d.from('document_archive').insert(docs.map(doc => ({
      doc_number: form.invoice_number,
      doc_type: doc.filename.includes('CI_CC') ? 'commercial_invoice_cc' : doc.filename.includes('DPL') ? 'detailed_packing_list' : doc.filename.includes('_PL') ? 'packing_list' : doc.filename.includes('Credit') ? 'credit_note_cc_diff' : 'commercial_invoice_actual',
      entity, doc_date: form.invoice_date,
      financial_year: new Date(form.invoice_date).getFullYear(),
      counterparty_type: 'customer', counterparty_id: form.customer_id,
      counterparty_name: custName, amount: actualTotal, currency: 'USD',
      source_table: 'commercial_invoices', source_id: inv.id, file_name: doc.filename
    }))).then(() => {}).catch(() => {}); // fire and forget

    setGeneratedDocs(docs);
    setStep(4);
    onSaved();

    } catch(err) {
      console.error('saveAndGenerate error:', err);
      alert('Error: ' + err.message + '\n\nPlease try again. If the problem persists, check your internet connection.');
    }
    setSaving(false);
  }

  function download(doc) {
    const blob = new Blob([doc.content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = doc.filename; a.click();
    URL.revokeObjectURL(url);
  }

  const stepLabels = ['Invoice Details', 'Upload Factory Docs', 'Review & Prices', 'Documents Ready'];

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal modal-lg">
        <div className="modal-hdr">
          <div>
            <div className="modal-title">New Commercial Invoice</div>
            <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 2 }}>Step {step} of 4 — {stepLabels[step-1]}</div>
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>
        <div style={{ display: 'flex', gap: 4, marginBottom: 20 }}>
          {stepLabels.map((s, i) => (
            <div key={i} style={{ flex: 1, textAlign: 'center' }}>
              <div style={{ height: 3, borderRadius: 2, background: i+1 <= step ? 'var(--accent)' : 'var(--navy-border)', marginBottom: 4 }} />
              <div style={{ fontSize: 10, color: i+1 <= step ? 'var(--accent-light)' : 'var(--text-muted)' }}>{s}</div>
            </div>
          ))}
        </div>

        {step === 1 && (
          <>
            <div className="grid2">
              <div className="form-group"><label className="form-label">Invoice Number *</label><input className="form-input" value={form.invoice_number} onChange={e => setForm({...form, invoice_number: e.target.value})} placeholder="KAAN20260429C1" /></div>
              <div className="form-group"><label className="form-label">Customer *</label>
                <select className="form-input" value={form.customer_id} onChange={e => setForm({...form, customer_id: e.target.value})}>
                  <option value="">Select customer...</option>
                  {customers.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              <div className="form-group"><label className="form-label">Invoice Date</label><input type="date" className="form-input" value={form.invoice_date} onChange={e => setForm({...form, invoice_date: e.target.value})} /></div>
              <div className="form-group"><label className="form-label">Sailing Date (ETD)</label><input type="date" className="form-input" value={form.sailing_date} onChange={e => setForm({...form, sailing_date: e.target.value})} /></div>
              <div className="form-group"><label className="form-label">Container No.</label><input className="form-input" value={form.container_number} onChange={e => setForm({...form, container_number: e.target.value})} /></div>
              <div className="form-group"><label className="form-label">B/L Number</label><input className="form-input" value={form.bl_number} onChange={e => setForm({...form, bl_number: e.target.value})} /></div>
              <div className="form-group"><label className="form-label">Port of Destination</label><input className="form-input" value={form.port_of_destination} onChange={e => setForm({...form, port_of_destination: e.target.value})} placeholder="MANZANILLO, MEXICO" /></div>
              <div className="form-group"><label className="form-label">Via</label>
                <select className="form-input" value={form.via} onChange={e => setForm({...form, via: e.target.value})}>
                  <option>OCEAN FREIGHT</option><option>AIR</option><option>FEDEX</option><option>DHL</option>
                </select>
              </div>
              <div className="form-group"><label className="form-label">Payment Terms</label><input className="form-input" value={form.payment_terms} onChange={e => setForm({...form, payment_terms: e.target.value})} /></div>
              <div className="form-group"><label className="form-label">Misc. Charges (USD)</label><input type="number" className="form-input" value={form.misc_charges} onChange={e => setForm({...form, misc_charges: e.target.value})} step="0.01" /></div>
            </div>
            <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 10 }}>
              <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
              <button className="btn btn-primary" onClick={() => { if (!form.invoice_number || !form.customer_id) { alert('Invoice number and customer required'); return; } setStep(2); }}>Next →</button>
            </div>
          </>
        )}

        {step === 2 && (
          <>
            <div className="alert alert-info" style={{ fontSize: 12 }}>
              📎 Upload <strong>all factory files</strong> for this shipment at once. Select multiple files using Ctrl+Click or Shift+Click.<br/>
              The system reads every file and auto-detects which factory it belongs to. No need to organise by factory.
            </div>

            {/* Multi-file upload zone */}
            <div style={{ marginBottom: 16 }}>
              <input
                type="file"
                multiple
                accept=".xlsx,.xls,.csv,.pdf,.doc,.docx,.png,.jpg,.jpeg"
                onChange={e => {
                  const files = Array.from(e.target.files);
                  // Create one factory block per file, auto-named from filename
                  const newFactories = files.map((file, i) => ({
                    id: Date.now() + i,
                    name: file.name.replace(/\.[^/.]+$/, '').replace(/[_-]/g, ' ').replace(/\b\w/g, c => c.toUpperCase()),
                    piFile: file,
                    plFile: null,
                    dplFile: null,
                  }));
                  setFactories(newFactories);
                }}
                style={{
                  width: '100%', background: 'var(--navy)',
                  border: '2px dashed var(--accent)', borderRadius: 12,
                  padding: '24px 16px', color: 'var(--text-primary)',
                  fontSize: 14, fontFamily: 'inherit', cursor: 'pointer',
                  textAlign: 'center', display: 'block'
                }}
              />
              <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 6, textAlign: 'center' }}>
                Hold Ctrl (Windows) or ⌘ (Mac) to select multiple files
              </div>
            </div>

            {/* Show uploaded files with factory name edit */}
            {factories.some(f => f.piFile) && (
              <div style={{ marginBottom: 14 }}>
                <div className="sh-title" style={{ marginBottom: 8 }}>{factories.filter(f=>f.piFile).length} file(s) ready — verify factory names:</div>
                {factories.filter(f => f.piFile).map((factory, fi) => (
                  <div key={factory.id} style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '8px 12px', background: 'var(--navy)', border: '1px solid var(--navy-border)', borderRadius: 8, marginBottom: 6 }}>
                    <span style={{ fontSize: 11, color: 'var(--green)' }}>✓</span>
                    <span style={{ fontSize: 12, color: 'var(--text-muted)', minWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{factory.piFile.name}</span>
                    <span style={{ fontSize: 11, color: 'var(--text-muted)' }}>→</span>
                    <FactorySearch
                      value={factory.name}
                      onChange={name => updateFactory(factory.id, 'name', name)}
                      factoryList={factoryList}
                      style={{ flex: 1 }}
                    />
                    <button className="btn btn-ghost btn-sm" style={{ color: 'var(--red)', fontSize: 11 }} onClick={() => removeFactory(factory.id)}>✕</button>
                  </div>
                ))}
              </div>
            )}

            {parseLog.length > 0 && (
              <div style={{ background: 'var(--navy)', border: '1px solid var(--navy-border)', borderRadius: 8, padding: '10px 14px', marginBottom: 12, fontFamily: 'monospace', fontSize: 11, maxHeight: 180, overflowY: 'auto' }}>
                {parseLog.map((line, i) => (
                  <div key={i} style={{ color: line.startsWith('✓') || line.startsWith('Total') ? 'var(--green)' : line.startsWith('⚠') || line.startsWith('Error') ? 'var(--gold)' : line.startsWith('---') ? 'var(--accent-light)' : 'var(--text-muted)', padding: '1px 0' }}>{line}</div>
                ))}
              </div>
            )}

            <div style={{ textAlign: 'center', color: 'var(--text-muted)', fontSize: 12, marginBottom: 8 }}>— or —</div>
            <button className="btn btn-ghost btn-sm" style={{ width: '100%', justifyContent: 'center', marginBottom: 16 }}
              onClick={() => { setItems([{ description:'',color:'',quantity:0,factory_name:'',factory_price:0,unit_price:'',cc_price:'',net_weight:0,gross_weight:0,packages:0,cbm:0,order_number:'',price_auto:false }]); setStep(3); }}>
              ✏️ Skip upload — enter items manually
            </button>
            <div style={{ display: 'flex', justifyContent: 'space-between', gap: 10 }}>
              <button className="btn btn-secondary" onClick={() => setStep(1)}>← Back</button>
              <button className="btn btn-primary" onClick={processAllFiles} disabled={parsing || !factories.some(f => f.piFile)}>
                {parsing ? '⏳ Reading ' + factories.filter(f=>f.piFile).length + ' files...' : '📖 Read & Extract All Files →'}
              </button>
            </div>
          </>
        )}

        {step === 3 && (
          <>
            {missingCount > 0 && (
              <div className="alert alert-warn">⚠️ <strong>{missingCount} item{missingCount>1?'s':''}</strong> have no price in our database — fill in Customer Price manually (red border). Factory price shown for reference.</div>
            )}
            {missingCount === 0 && items.filter(i=>i.description).length > 0 && (
              <div className="alert" style={{ background: 'rgba(16,185,129,0.1)', border: '1px solid rgba(16,185,129,0.2)', color: '#10b981' }}>✓ All prices found in price list! Review and adjust if needed.</div>
            )}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <div className="sh-title">{items.length} items from {[...new Set(items.map(i=>i.factory_name).filter(Boolean))].length} factory/factories</div>
              <button className="btn btn-secondary btn-sm" onClick={() => setItems(p => [...p, { description:'',color:'',quantity:0,factory_name:'',factory_price:0,unit_price:'',cc_price:'',net_weight:0,gross_weight:0,packages:0,cbm:0,order_number:'',price_auto:false }])}>+ Add Row</button>
            </div>
            <div className="table-wrap" style={{ marginBottom: 14 }}>
              <table>
                <thead>
                  <tr>
                    <th>Item / Description</th>
                    <th>Color</th>
                    <th>Factory</th>
                    <th style={{ color: '#475569' }}>Factory Price</th>
                    <th style={{ color: 'var(--accent-light)' }}>Customer Price *</th>
                    <th style={{ color: 'var(--gold)' }}>CC Price</th>
                    <th>Qty (mts)</th>
                    <th>Net Wt</th>
                    <th>Gross Wt</th>
                    <th>Pkgs</th>
                    <th>CBM</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody>
                  {items.map((item, i) => (
                    <tr key={i} style={{ background: !item.unit_price && item.description ? 'rgba(239,68,68,0.05)' : undefined }}>
                      <td><input className="form-input" style={{ fontSize: 12, padding: '4px 7px', minWidth: 160 }} value={item.description} onChange={e => upItem(i,'description',e.target.value)} /></td>
                      <td><input className="form-input" style={{ fontSize: 12, padding: '4px 7px', width: 75 }} value={item.color} onChange={e => upItem(i,'color',e.target.value)} /></td>
                      <td><input className="form-input" style={{ fontSize: 12, padding: '4px 7px', width: 85 }} value={item.factory_name} onChange={e => upItem(i,'factory_name',e.target.value)} /></td>
                      <td><input type="number" className="form-input" style={{ fontSize: 12, padding: '4px 7px', width: 72, color: 'var(--text-muted)' }} value={item.factory_price} onChange={e => upItem(i,'factory_price',e.target.value)} step="0.0001" /></td>
                      <td>
                        <input type="number" className="form-input"
                          style={{ fontSize: 12, padding: '4px 7px', width: 88, borderColor: !item.unit_price && item.description ? 'var(--red)' : item.price_auto ? 'var(--green)' : undefined }}
                          value={item.unit_price} onChange={e => upItem(i,'unit_price',e.target.value)} placeholder="Required" step="0.0001" />
                        {item.price_auto && <div style={{ fontSize: 9, color: 'var(--green)', marginTop: 1 }}>✓ price list</div>}
                      </td>
                      <td>
                        <input type="number" className="form-input"
                          style={{ fontSize: 12, padding: '4px 7px', width: 88, borderColor: item.cc_price && +item.cc_price > 0 ? 'var(--gold)' : undefined }}
                          value={item.cc_price} onChange={e => upItem(i,'cc_price',e.target.value)} placeholder="Optional" step="0.0001" />
                      </td>
                      <td><input type="number" className="form-input" style={{ fontSize: 12, padding: '4px 7px', width: 75 }} value={item.quantity} onChange={e => upItem(i,'quantity',e.target.value)} /></td>
                      <td><input type="number" className="form-input" style={{ fontSize: 12, padding: '4px 7px', width: 68 }} value={item.net_weight} onChange={e => upItem(i,'net_weight',e.target.value)} /></td>
                      <td><input type="number" className="form-input" style={{ fontSize: 12, padding: '4px 7px', width: 68 }} value={item.gross_weight} onChange={e => upItem(i,'gross_weight',e.target.value)} /></td>
                      <td><input type="number" className="form-input" style={{ fontSize: 12, padding: '4px 7px', width: 55 }} value={item.packages} onChange={e => upItem(i,'packages',e.target.value)} /></td>
                      <td><input type="number" className="form-input" style={{ fontSize: 12, padding: '4px 7px', width: 65 }} value={item.cbm} onChange={e => upItem(i,'cbm',e.target.value)} step="0.001" /></td>
                      <td><button className="btn btn-ghost btn-sm" style={{ color: 'var(--red)' }} onClick={() => setItems(p => p.filter((_,idx) => idx !== i))}>✕</button></td>
                    </tr>
                  ))}
                </tbody>
                <tfoot>
                  <tr>
                    <td colSpan={4} style={{ textAlign: 'right', fontWeight: 600, padding: '10px 13px', color: 'var(--text-primary)' }}>Actual Total:</td>
                    <td style={{ fontFamily: 'monospace', fontWeight: 700, color: 'var(--green)', padding: '10px 13px' }}>{fmtUSD(actualTotal)}</td>
                    <td style={{ fontFamily: 'monospace', fontWeight: 700, color: 'var(--gold)', padding: '10px 13px' }}>{hasCCPrices ? 'CC: '+fmtUSD(ccTotal) : '—'}</td>
                    <td colSpan={6} />
                  </tr>
                </tfoot>
              </table>
            </div>
            {hasCCPrices && (
              <div className="alert alert-warn">⚠️ CC prices entered. Will generate: Actual CI + CC CI + Credit Note for {fmtUSD(ccTotal - actualTotal)}</div>
            )}
            {dplItems.length > 0 && (
              <div style={{ marginBottom: 14, padding: '10px 14px', background: 'var(--navy)', borderRadius: 10, border: '1px solid var(--navy-border)' }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: 'var(--text-primary)' }}>📋 DPL: {dplItems.length} rolls extracted — will be included</div>
              </div>
            )}
            <div style={{ display: 'flex', justifyContent: 'space-between', gap: 10 }}>
              <button className="btn btn-secondary" onClick={() => setStep(2)}>← Back</button>
              <button className="btn btn-primary" onClick={saveAndGenerate} disabled={saving}>
                {saving ? '⏳ Saving & Generating...' : '✅ Save & Generate All Documents →'}
              </button>
            </div>
          </>
        )}

        {step === 4 && (
          <>
            <div style={{ textAlign: 'center', padding: '20px 0 16px' }}>
              <div style={{ fontSize: 44, marginBottom: 12 }}>✅</div>
              <div style={{ fontSize: 17, fontWeight: 700, color: 'var(--text-primary)', marginBottom: 6 }}>All Documents Generated!</div>
              <div style={{ fontSize: 13, color: 'var(--text-muted)' }}>Invoice {form.invoice_number} saved to system & archive</div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 24 }}>
              {generatedDocs.map((doc, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 18px', background: 'var(--navy)', border: '1px solid var(--navy-border)', borderRadius: 12 }}>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 600, color: 'var(--text-primary)' }}>{doc.label}</div>
                    <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 2 }}>{doc.filename}</div>
                  </div>
                  <button className="btn btn-secondary btn-sm" onClick={() => download(doc)}>⬇ Download</button>
                </div>
              ))}
            </div>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'center' }}>
              <button className="btn btn-primary" onClick={() => generatedDocs.forEach(download)}>⬇ Download All</button>
              <button className="btn btn-secondary" onClick={onClose}>Close</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ─── ROUTER ──────────────────────────────────────────────────
// ─── CREDIT / DEBIT NOTES PAGE ───────────────────────────────
function Notes() {
  const { entity } = useApp();
  const [tab, setTab] = useState('cn_customer');
  const [notes, setNotes] = useState([]);
  const [customers, setCustomers] = useState([]);
  const [factories, setFactories] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showNew, setShowNew] = useState(false);

  useEffect(() => { loadMaster(); }, [entity]);
  useEffect(() => { loadNotes(); }, [entity, tab]);

  async function loadMaster() {
    const [r1, r2] = await Promise.all([
      db(entity).from('customers').select('id,name,code').order('name'),
      db(entity).from('factories').select('id,name,short_name').order('name'),
    ]);
    setCustomers(r1.data || []);
    setFactories(r2.data || []);
  }

  async function loadNotes() {
    setLoading(true);
    const d = db(entity);
    let data = [];
    if (tab === 'cn_customer') {
      const r = await d.from('credit_notes').select('*, customers(name)').eq('entity', entity).order('cn_date', { ascending: false });
      data = r.data || [];
    } else if (tab === 'dn_customer') {
      const r = await d.from('debit_notes').select('*, customers(name)').eq('entity', entity).order('dn_date', { ascending: false });
      data = r.data || [];
    } else if (tab === 'dn_factory') {
      const r = await d.from('factory_debit_notes').select('*, factories(name,short_name)').eq('entity', entity).order('dn_date', { ascending: false });
      data = r.data || [];
    } else {
      const r = await d.from('factory_credit_notes').select('*, factories(name,short_name)').eq('entity', entity).order('cn_date', { ascending: false });
      data = r.data || [];
    }
    setNotes(data);
    setLoading(false);
  }

  const totalOpen = notes.filter(n => n.status === 'open').reduce((s,n) => s + (n.outstanding_amount || n.amount || 0), 0);

  const CN_TYPE_LABELS = { early_payment_discount: 'Early Pay Discount', cc_actual_difference: 'CC vs Actual', claim: 'Claim' };
  const STATUS_COLORS = { open: 'by', partially_applied: 'bo', fully_applied: 'bg', settled: 'bg', issued: 'bb', acknowledged: 'bb', cancelled: 'bgr', voided: 'bgr', received: 'bb', under_review: 'by', accepted: 'bg', rejected: 'br' };

  return (
    <div>
      <div className="stat-grid">
        <div className="stat-card"><div className="stat-label">Open Balance</div><div className="stat-val" style={{ fontSize: 18, color: 'var(--gold)' }}>{fmtUSD(totalOpen)}</div><div className="stat-sub">Pending application</div></div>
        <div className="stat-card"><div className="stat-label">Total Notes</div><div className="stat-val" style={{ fontSize: 18 }}>{notes.length}</div></div>
      </div>

      <div style={{ display: 'flex', gap: 10, marginBottom: 14, alignItems: 'center' }}>
        <div className="tabs" style={{ marginBottom: 0, flex: 1 }}>
          <button className={`tab ${tab === 'cn_customer' ? 'active' : ''}`} onClick={() => setTab('cn_customer')}>📝 CN to Customers</button>
          <button className={`tab ${tab === 'dn_customer' ? 'active' : ''}`} onClick={() => setTab('dn_customer')}>📨 DN from Customers</button>
          <button className={`tab ${tab === 'dn_factory' ? 'active' : ''}`} onClick={() => setTab('dn_factory')}>📤 DN to Factories</button>
          <button className={`tab ${tab === 'cn_factory' ? 'active' : ''}`} onClick={() => setTab('cn_factory')}>📥 CN from Factories</button>
        </div>
        <button className="btn btn-primary btn-sm" onClick={() => setShowNew(true)}>+ New Note</button>
      </div>

      <div className="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Reference No.</th>
              <th>{tab.includes('customer') ? 'Customer' : 'Factory'}</th>
              <th>Date</th>
              {tab === 'cn_customer' && <th>Type</th>}
              <th>Amount</th>
              <th>Applied</th>
              <th>Outstanding</th>
              <th>Status</th>
              <th>Description</th>
            </tr>
          </thead>
          <tbody>
            {loading ? <tr><td colSpan={9}><div className="empty">Loading...</div></td></tr>
              : notes.length === 0 ? <tr><td colSpan={9}><div className="empty">No notes found</div></td></tr>
              : notes.map(note => (
                <tr key={note.id}>
                  <td className="td-p td-mono">{note.cn_number || note.dn_number || '—'}</td>
                  <td>{note.customers?.name || note.factories?.short_name || note.factories?.name || '—'}</td>
                  <td>{fmtDate(note.cn_date || note.dn_date)}</td>
                  {tab === 'cn_customer' && <td><span className="badge bb" style={{ fontSize: 10 }}>{CN_TYPE_LABELS[note.cn_type] || note.cn_type}</span></td>}
                  <td className="td-amt">{fmtUSD(note.amount)}</td>
                  <td className="td-amt" style={{ color: 'var(--green)' }}>{fmtUSD(note.applied_amount || 0)}</td>
                  <td className="td-amt" style={{ fontWeight: 600, color: (note.outstanding_amount || note.amount) > 0 ? 'var(--gold)' : 'var(--green)' }}>
                    {fmtUSD(note.outstanding_amount ?? note.amount)}
                  </td>
                  <td><span className={`badge ${STATUS_COLORS[note.status] || 'bgr'}`}>{note.status?.replace(/_/g,' ')}</span></td>
                  <td style={{ fontSize: 12, maxWidth: 220, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{note.description || '—'}</td>
                </tr>
              ))
            }
          </tbody>
        </table>
      </div>

      {showNew && <NewNoteModal tab={tab} customers={customers} factories={factories} entity={entity} onClose={() => setShowNew(false)} onSaved={loadNotes} />}
    </div>
  );
}

function NewNoteModal({ tab, customers, factories, entity, onClose, onSaved }) {
  const [form, setForm] = useState({
    customer_id: '', factory_id: '',
    date: today(), amount: '', description: '',
    cn_type: 'claim', claim_reason: '', status: 'open',
    dn_number: '', cn_number: '',
  });
  const [saving, setSaving] = useState(false);

  async function save() {
    if (!form.amount || !form.description) { alert('Amount and description required'); return; }
    setSaving(true);
    const d = db(entity);
    const ref = (tab === 'cn_customer' ? 'KAANCN' : tab === 'dn_customer' ? 'KAANDN-C' : tab === 'dn_factory' ? 'KAANDN-F' : 'KAANCN-F') + Date.now();
    const amt = parseFloat(form.amount);

    if (tab === 'cn_customer') {
      await d.from('credit_notes').insert({ cn_number: form.cn_number || ref, customer_id: form.customer_id, entity, cn_date: form.date, cn_type: form.cn_type, amount: amt, outstanding_amount: amt, applied_amount: 0, description: form.description, status: 'open' });
    } else if (tab === 'dn_customer') {
      await d.from('debit_notes').insert({ dn_number: form.dn_number || ref, customer_id: form.customer_id, entity, dn_date: form.date, amount: amt, description: form.description, claim_reason: form.claim_reason, status: 'received' });
    } else if (tab === 'dn_factory') {
      await d.from('factory_debit_notes').insert({ dn_number: ref, factory_id: form.factory_id, entity, dn_date: form.date, amount: amt, description: form.description, claim_reason: form.claim_reason, status: 'issued' });
    } else {
      await d.from('factory_credit_notes').insert({ cn_number: form.cn_number || ref, factory_id: form.factory_id, entity, cn_date: form.date, amount: amt, outstanding_amount: amt, applied_amount: 0, description: form.description, status: 'open' });
    }

    onSaved(); onClose(); setSaving(false);
  }

  const isCustomer = tab.includes('customer');
  const isCN = tab.startsWith('cn');

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal modal-sm">
        <div className="modal-hdr">
          <div className="modal-title">
            {tab === 'cn_customer' ? 'New Credit Note to Customer' : tab === 'dn_customer' ? 'New Debit Note from Customer' : tab === 'dn_factory' ? 'New Debit Note to Factory' : 'New Credit Note from Factory'}
          </div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>

        <div className="form-group">
          <label className="form-label">{isCustomer ? 'Customer' : 'Factory'} *</label>
          {isCustomer
            ? <select className="form-input" value={form.customer_id} onChange={e => setForm({...form, customer_id: e.target.value})}><option value="">Select...</option>{customers.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}</select>
            : <select className="form-input" value={form.factory_id} onChange={e => setForm({...form, factory_id: e.target.value})}><option value="">Select...</option>{factories.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}</select>
          }
        </div>

        {tab === 'cn_customer' && (
          <div className="form-group">
            <label className="form-label">Credit Note Type</label>
            <select className="form-input" value={form.cn_type} onChange={e => setForm({...form, cn_type: e.target.value})}>
              <option value="early_payment_discount">Early Payment Discount (1%)</option>
              <option value="cc_actual_difference">CC vs Actual Invoice Difference</option>
              <option value="claim">Claim</option>
            </select>
          </div>
        )}

        <div className="grid2">
          <div className="form-group">
            <label className="form-label">Date *</label>
            <input type="date" className="form-input" value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
          </div>
          <div className="form-group">
            <label className="form-label">Amount (USD) *</label>
            <input type="number" className="form-input" value={form.amount} onChange={e => setForm({...form, amount: e.target.value})} step="0.01" />
          </div>
        </div>

        {(tab === 'dn_customer' || tab === 'dn_factory') && (
          <div className="form-group">
            <label className="form-label">{tab === 'dn_customer' ? 'Customer DN Number' : 'Reference'}</label>
            <input className="form-input" value={form.dn_number} onChange={e => setForm({...form, dn_number: e.target.value})} placeholder="Their DN reference number" />
          </div>
        )}

        <div className="form-group">
          <label className="form-label">Description *</label>
          <textarea className="form-input" value={form.description} onChange={e => setForm({...form, description: e.target.value})} rows={3} placeholder="Describe the reason..." />
        </div>

        {(tab === 'dn_customer' || tab === 'dn_factory') && (
          <div className="form-group">
            <label className="form-label">Claim Reason</label>
            <input className="form-input" value={form.claim_reason} onChange={e => setForm({...form, claim_reason: e.target.value})} placeholder="e.g. quality issue, short shipment, wrong color" />
          </div>
        )}

        <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={save} disabled={saving}>{saving ? 'Saving...' : 'Save →'}</button>
        </div>
      </div>
    </div>
  );
}
